# Nextest configuration for coordinode
# See https://nexte.st/docs/configuration/

[store]
dir = "target/nextest"

[profile.default]
fail-fast = false

[profile.default.slow-timeout]
period = "30s"

# Raft cluster tests: bounded concurrency.
# Each test spawns 3 tokio runtimes with gRPC servers — election-timing-
# sensitive (300-600ms). Earlier full-parallel runs were flaky from CPU
# oversubscription. Pattern: each test claims 3 threads (one per node);
# group caps at 6 → at most 2 raft tests concurrent on a ≥8-core host.
# Verified stable across 3 consecutive runs (25/25 each, ~104s).
[[profile.default.overrides]]
filter = "binary(raft_cluster)"
threads-required = 3
test-group = "raft-cluster"

[test-groups.raft-cluster]
max-threads = 6

# Heavy property-based tests: bounded concurrency to prevent oversubscription
# when they coincide with raft tests. Each proptest claims 2 threads; group
# caps at 4 → at most 2 proptests concurrent, leaving headroom for raft and
# the rest of the workspace. Cases-per-test was reduced (modality 128→32,
# storage 64→32) — see test source comments.
[[profile.default.overrides]]
filter = "test(/proptest_invariants/) + test(/coordinator_proptest/)"
threads-required = 2
test-group = "heavy-proptest"

[test-groups.heavy-proptest]
max-threads = 4

# CI profile: inherits overrides via re-declaration + JUnit output
[profile.ci]
fail-fast = false

[profile.ci.slow-timeout]
period = "60s"

[profile.ci.junit]
path = "junit.xml"

[[profile.ci.overrides]]
filter = "binary(raft_cluster)"
threads-required = 3
test-group = "raft-cluster"

[[profile.ci.overrides]]
filter = "test(/proptest_invariants/) + test(/coordinator_proptest/)"
threads-required = 2
test-group = "heavy-proptest"
