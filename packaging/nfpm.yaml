name: coordinode
arch: ${GOARCH}
platform: linux
version: ${VERSION}
version_schema: semver
section: database
priority: optional
maintainer: Structured World Foundation <oss@sw.foundation>
description: |
  CoordiNode — unified database for AI-native applications.
  Graph + Vector + Full-Text + Document + Time-Series in one engine,
