# CoordiNode server configuration.
#
# This is the single configuration gate for the server. It is read by
# /usr/lib/systemd/system/coordinode.service via:
#
#   ExecStart=/usr/bin/coordinode serve --config /etc/coordinode/coordinode.conf
#
# Every value here can also be given as a `coordinode serve` command-line flag;
# the command line overrides this file, which overrides the built-in defaults.
# After editing, run:
#
#   sudo systemctl restart coordinode
#
# Format is YAML. Uncommented keys override the default; commented keys show the
# default value. Marked as a configuration file in the RPM/DEB package, so local
# edits are preserved across upgrades.

# Operational mode. CE supports only "full"; "compute" / "storage" require
# coordinode-ee.
mode: full

# Numeric node id for this instance. Single-node deployments use 1. A value
# above 1 is only valid together with a non-empty `peers` list.
node_id: 1

# gRPC listen address (native API + inter-node Raft).
grpc_addr: "0.0.0.0:7080"

# Address advertised to peers (defaults to grpc_addr when unset).
# advertise_addr: "node1.internal:7080"

# REST/JSON listen address (transcoded from gRPC by the embedded proxy).
rest_addr: "0.0.0.0:7081"

# Operational HTTP listen address — Prometheus /metrics, /health, /ready.
# Bind to loopback by default; expose via reverse proxy if scraping remotely.
ops_addr: "127.0.0.1:7084"

# Data directory. Owned by the coordinode system user; created by systemd's
# StateDirectory= on first start when missing. Used by the consensus log, CDC,
# and (when storage.endpoints below is empty) as the single storage endpoint.
data_dir: /var/lib/coordinode/data

# Storage topology. Leave storage.endpoints empty (the default) for the common
# single-disk case: one durable HDD warm-tier endpoint rooted at data_dir.
#
# To spread storage across multiple disks (NVMe cache + SSD + HDD JBOD), declare
# each mount point as an endpoint. Per-LSM-level placement, cascade eviction, and
# WAL/oplog routing across endpoints are driven from this list. Per endpoint:
#
#   id           required  unique name (metrics, logs, placement)
#   path         required  exclusive mount-point directory
#   media        required  hdd | ssd | nvme | ram
#   durability   required  durable | degraded | volatile
#   tier         required  memory | hot_cache | hot | warm | cold
#   capacity_bytes      opt  physical capacity (0 / omitted = untracked)
#   hard_limit_bytes    opt  never write past this (0 / omitted = no limit)
#   page_ecc            opt  auto (default) | force_on | force_off
#                            auto: ECC on for degraded, off for durable / volatile.
#                            force_on needs a binary built with --features page_ecc.
#   hard_limit_strategy opt  reject (default) | cascade_evict
#
# When set, storage.endpoints overrides data_dir for storage placement. Passing
# --data on the command line collapses back to a single endpoint at that path.
#
# storage:
#   endpoints:
#     - id: nvme-hot
#       path: /mnt/nvme0/coordinode
#       media: nvme
#       durability: durable
#       tier: hot
#     - id: hdd-cold
#       path: /mnt/hdd0/coordinode
#       media: hdd
#       durability: degraded
#       tier: cold
#       page_ecc: force_on
#       capacity_bytes: 16000000000000
storage:
  endpoints: []

# Cluster peer addresses. Empty = standalone single node. For a 3-node HA
# cluster, list the other members' advertise addresses on each node:
# peers:
#   - "node2.internal:7080"
#   - "node3.internal:7080"
peers: []

# Open-file-descriptor soft-limit target. Unset = raise the soft limit to the
# hard limit (the unit's LimitNOFILE).
# nofile: 262144

# Max in-flight requests per client connection. Unset = unbounded.
# max_connections: 1024

# Max decoded request size in MiB.
max_request_size_mb: 16

# Per-request timeout in seconds. Unset = no timeout.
# request_timeout_secs: 30

# HTTP/2 keepalive ping interval in seconds. Unset = disabled.
# http2_keepalive_secs: 60

# Block-cache size in MiB. Unset = storage-engine default.
# cache_size_mb: 4096

# Memtable size in MiB. Unset = storage-engine default.
# write_buffer_mb: 256

# MVCC time-travel / AS OF TIMESTAMP horizon in seconds. Unset = 7 days.
# retention_window_secs: 604800

# Consumer-registry heartbeat coalescing window in ms. Unset = 100.
# registry_heartbeat_ms: 100

# Consumer-registry TTL-eviction sweep interval in ms. Unset = 1000.
# registry_eviction_ms: 1000

# Auto-rollback an interactive transaction (BEGIN without COMMIT) that has been
# idle this long, freeing its pinned MVCC snapshot and buffered memory.
interactive_txn_idle_timeout_secs: 30

# Max buffered (uncommitted) bytes per interactive transaction before it is
# aborted (268435456 = 256 MiB).
interactive_txn_max_bytes: 268435456

# Inter-node gRPC transport zstd compression level for wire traffic (C-zstd
# numbering: 1..=22 trade speed for ratio). Default 3 is zstd's standard
# speed/ratio default (~9x smaller Raft batches on the wire). Raise it on a
# bandwidth-constrained link (e.g. a geo replica) where bandwidth costs more
# than CPU.
wire_compression_level: 3
