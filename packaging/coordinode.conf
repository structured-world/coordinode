# CoordiNode default environment configuration.
#
# This file is read by /usr/lib/systemd/system/coordinode.service via
# EnvironmentFile=. Edit values and run:
#
#   sudo systemctl restart coordinode
#
# Marked as a configuration file in the RPM/DEB package — local edits are
# preserved across upgrades (nfpm `type: config|noreplace`).

# gRPC listen address (native API + inter-node Raft).
COORDINODE_ADDR=0.0.0.0:7080

# REST/JSON listen address (transcoded from gRPC by the embedded proxy).
COORDINODE_REST_ADDR=0.0.0.0:7081

# Operational HTTP listen address — Prometheus /metrics, /health, /ready.
# Bind to loopback by default; expose via reverse proxy if scraping remotely.
COORDINODE_OPS_ADDR=127.0.0.1:7084

# Data directory. Owned by the coordinode system user; created by
# systemd's StateDirectory= on first start when missing.
COORDINODE_DATA=/var/lib/coordinode/data

# Optional: structured JSON logs (uncomment to enable).
# COORDINODE_LOG_FORMAT=json

# Optional: log level filter (RUST_LOG syntax).
# RUST_LOG=info

# Extra `coordinode serve` flags, appended verbatim to the command line.
# Use this to tune resource, network, and storage limits without editing the
# unit. Space-separated; expanded with word-splitting. See the documentation
# for the full flag reference. Examples (uncomment and edit as needed):
#
#   --nofile N               open-file-descriptor soft limit (default: hard limit)
#   --max-connections N      max in-flight requests per client connection
#   --max-request-size-mb N  max decoded request size in MiB (default: 16)
#   --request-timeout-secs N per-request timeout (default: none)
#   --http2-keepalive-secs N HTTP/2 keepalive ping interval (default: none)
#   --cache-size-mb N        block cache size in MiB (default: engine default)
#   --write-buffer-mb N      memtable size in MiB (default: engine default)
#   --retention-window-secs N  MVCC time-travel / AS OF TIMESTAMP horizon in
#                              seconds (default: 604800 = 7 days)
#   --registry-heartbeat-ms N  consumer-registry heartbeat coalescing window
#                              in ms (default: 100)
#   --registry-eviction-ms N   consumer-registry TTL eviction sweep interval
#                              in ms (default: 1000)
#
# COORDINODE_EXTRA_ARGS=--nofile 262144 --cache-size-mb 4096 --max-connections 1024
