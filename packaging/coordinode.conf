# CoordiNode default environment configuration.
#
# This file is read by /usr/lib/systemd/system/coordinode.service via
# EnvironmentFile=. Edit values and run:
#
#   sudo systemctl restart coordinode
#
# Marked as a configuration file in the RPM/DEB package — local edits are
# preserved across upgrades (nfpm `type: config|noreplace`).

# gRPC listen address (native API + inter-node Raft).
COORDINODE_ADDR=0.0.0.0:7080

# REST/JSON listen address (transcoded from gRPC by the embedded proxy).
COORDINODE_REST_ADDR=0.0.0.0:7081

# Operational HTTP listen address — Prometheus /metrics, /health, /ready.
# Bind to loopback by default; expose via reverse proxy if scraping remotely.
COORDINODE_OPS_ADDR=127.0.0.1:7084

# Data directory. Owned by the coordinode system user; created by
# systemd's StateDirectory= on first start when missing.
COORDINODE_DATA=/var/lib/coordinode/data

# Optional: structured JSON logs (uncomment to enable).
# COORDINODE_LOG_FORMAT=json

# Optional: log level filter (RUST_LOG syntax).
# RUST_LOG=info
