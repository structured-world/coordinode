# Competitor baseline numbers — Level 3 composite score consumes
# these. Every entry MUST cite a source. Numbers expressed in the
# benchmark's native unit; the report layer converts to ratios with
# units made explicit.
#
# CoordiNode's primary competitors are MULTI-MODEL engines that
# overlap our positioning: SurrealDB, ArangoDB, MongoDB (also
# OpenSearch for vector+text, PostGIS for spatial). Modality-only
# specialists (Neo4j-only, hnswlib-only, etc.) are kept as secondary
# anchors so engineers can also see "does CoordiNode hold specialist-
# tier perf in modality X?", but the headline marketing numbers are
# always vs multi-model peers.
#
# Numbers marked `null` are "must measure" — competitor doesn't
# publish a directly comparable number for this benchmark; our own
# bench fills in the comparison once we run their engine against
# the same dataset.

# ─────────────────────────────────────────────────────────────
# Graph (LDBC SNB Interactive v2, SF-1 unless noted)
# ─────────────────────────────────────────────────────────────

[graph.ldbc_snb_interactive_v2]
dataset = "SF-1"

# Primary: multi-model
[graph.ldbc_snb_interactive_v2.surrealdb_3_0]
notes = "SurrealDB 3.0 published 8-22x graph speedup vs 2.x but no direct LDBC numbers yet — measured by us against their crud-bench graph_traversal group"
source = "SurrealDB 3.0 benchmarks blog (Oct 2025)"

[graph.ldbc_snb_interactive_v2.arangodb_3_12]
notes = "ArangoDB beats Neo4j 1.7-8.5x on wiki-Talk (PageRank, WCC) — community LDBC SNB impl available"
source = "arango.ai benchmark blog (2025)"

# Secondary anchor
[graph.ldbc_snb_interactive_v2.neo4j_5]
throughput_ops_min = 8000
source = "UC Merced LDBC SNB Interactive v1 study (2023)"

