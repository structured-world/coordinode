# ─── Competitor runs (from ann-benchmarks Docker harness, c94edcc snapshot) ─

[[qdrant.sift_128_euclidean]]
docker_image = "qdrant/qdrant:v1.5.1"
client_version = "qdrant-client==1.5.4"
dataset = "sift-128-euclidean"
dataset_n_train = 1_000_000
dataset_n_test = 10_000
k = 10
m = 16                   # config.yml run_groups.default.args
ef_construction = 256    # config.yml run_groups.default.args (CoordiNode uses 200)
build_threads = "all logical CPUs (qdrant docker default, 16 on ro)"
search_threads = "all logical CPUs (qdrant docker default, no QDRANT__SERVICE__MAX_REQUEST_THREADS cap)"
source_json = "bench-results/vector/sift-128-euclidean/c94edcc-qdrant-M-1-20260525-040243.json"
recall_at_k_peak = 0.97123
qps_at_recall_peak = 1536.42  # ← THIS NUMBER ASSUMES SERVER-WIDE PARALLELISM. NOT comparable to CoordiNode search_threads=1 above.
notes = """
hnsw_m and hnsw_ef_construction recorded as `-1` / `None` in JSON metadata
because qdrant doesn't expose those back through the wire format. Values
above are pulled from config.yml. Build time recorded as 618s.
"""

# ─── Honest cross-engine comparisons ────────────────────────────────────────
#
# A claim like "CoordiNode is N× faster than qdrant" is only valid when
# this section records it under matched conditions. Right now the only
# directly-recorded comparison row is:
#
#   sift-128 f32 single-thread CoordiNode = 4233 QPS @ recall 0.973
#   sift-128 f32 multi-thread (16t)  qdrant   = 1536 QPS @ recall 0.971
#
# Per-engine throughput is in the same ballpark, but qdrant uses 16× more
# CPU. If we divide qdrant by its thread count for per-core throughput:
#   1536 / 16 ≈ 96 QPS/thread
#   CoordiNode 4233 / 1 = 4233 QPS/thread → ~44× per-core advantage
# but that's a synthetic projection; we have no measurement of qdrant
# pinned to 1 thread on ro.
#
# Real verdicts (head-to-head, matched conditions) MUST be recorded under
# `comparisons` once measured. NEVER fold the unverified per-core
# projection into a top-line claim.

# [[comparisons]]
# date = "2026-MM-DD"
# matched = "sift-128-euclidean, k=10, m=16, search_threads=1"
# coordinode = { sha = "...", qps = ..., recall = ... }
# qdrant     = { docker_tag = "...", qps = ..., recall = ... }
# verdict = "..."

