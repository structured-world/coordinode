docker_stats_cpu_pct_observed = "97.72% of one logical CPU"  # live `docker stats --no-stream` during build phase 2026-06-03
source_json = "bench-results/vector/sift-128-euclidean/c94edcc-qdrant-M-1-20260525-040243.json"
recall_at_k_peak = 0.97123
qps_at_recall_peak = 1536.42
notes = """
Thread topology now VERIFIED post-hoc by re-running the same
ann-benchmarks Docker invocation on ro on 2026-06-03 and inspecting
the container directly:

  $ docker inspect <container> --format '{{.HostConfig.CpusetCpus}}'
  1

The runner at /opt/annb/ann-benchmarks/ann_benchmarks/runner.py:341
passes `cpuset_cpus=cpu_limit` to docker, where `cpu_limit` is set to
a single CPU id by main.py:73 when `--batch` is NOT passed. The
c94edcc run was a non-batch invocation, so qdrant ran pinned to ONE
logical CPU via cgroup cpuset, regardless of how many internal
worker threads the qdrant server spawned (PIDs=36 observed inside
the container — those threads all share the single CPU).

`docker stats --no-stream` during the re-run reported 97.72% — i.e.
the cgroup ceiling of one logical core was effectively saturated,
not 1600% (16 cores) as would happen if cpuset were unrestricted.

Net effect: this row is a SINGLE-THREAD measurement. CoordiNode
sift-128 d365611 row above is ALSO single-thread search (sweep_one
sequential loop). The two numbers are directly comparable:

  CoordiNode  4233 QPS @ recall 0.9732 (ef= 80)   (single thread)
  qdrant      1536 QPS @ recall 0.9712            (single thread)

  → CoordiNode ~2.75× faster at matched recall, matched threads.
"""

