# Manually-verified bench runs with FULL conditions.
#
# Every QPS / recall number in this file is recorded together with the EXACT
# conditions it was measured under: dataset, hardware, thread topology (build
# AND search), HNSW params, and source JSON. Do NOT compare numbers across
# rows unless every condition in the `conditions` table matches.
#
# WHY this file exists: ad-hoc cross-comparisons (e.g. "CoordiNode 4233 QPS
# vs qdrant 1536 QPS = 2.7× win") have already burned us once when the
# threads-per-search didn't match. CoordiNode `bench-vector-ann` runs search
# single-threaded (`sweep_one` loops queries sequentially per the code
# comments in benches/vector-ann/src/main.rs:155-160), while qdrant's
# `qdrant/qdrant:v1.5.1` Docker image with no thread-cap env var runs the
# search worker pool across ALL logical CPUs of the host. Comparing those
# two numbers as "QPS" without a thread caveat is meaningless.
#
# Append rows only — never edit a historical row, because the JSON paths
# under `bench-results/vector/` may rotate or get pruned. If you re-bench
# the same config to verify, add a fresh row with a new timestamp.

# ─── Hardware ───────────────────────────────────────────────────────────────
[hardware.ro]
hostname = "ro.private.systems"  # 192.168.1.200
cpu = "Intel i9-9900K"            # 8 cores / 16 threads, AVX2 + FMA, NO AVX-512
cores_physical = 8
threads_logical = 16
notes = """
Bench host. All CI vector benches and donor competitor runs happen here.
For honest per-core comparisons, restrict competitor server processes to
one thread (or measure CoordiNode multi-thread search through a wrapper).
"""

# ─── CoordiNode runs ────────────────────────────────────────────────────────

