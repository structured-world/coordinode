Vamana paper's reported overhead. The pruning loop's O(R · |V|)
distance_between_nodes calls per insert (R=32 layer-0 cap, |V|=200
ef_construction) translate to ~6.4k extra f32 cosine distances per
node × 1.18M nodes = ~7.6 billion extra distance ops. For a one-time
build that ships a long-lived read-heavy index this is acceptable;
for high-churn workloads it's a concern.
"""

