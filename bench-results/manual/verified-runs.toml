notes = """
First end-of-search rerank measurement. Cheap-distance HNSW traversal
followed by one exact f32 rerank pass on the final ef-sized result
heap — qdrant Binary Quantization (`rescore: true`) / chroma
RaBitQ-Library / DiskANN / RaBitQ SIGMOD 2024 §4 pattern.

QPS impact on the matched-thread comparison:
- inline   α=1.0 ef=800: 158 QPS @ recall 0.9409
- inline   α=1.2 ef=800: 139 QPS @ recall 0.9510
- end-of-search α=1.0 ef=800: 454 QPS @ recall 0.8969
  → +188% QPS vs inline α=1.0 at ef=800, ~5pt recall trade

The recall trade is because the HNSW termination gate uses the noisy
RaBitQ popcount distance instead of the exact f32. To hit recall ≥
0.95 with end-of-search, the ef has to climb past 800 (extrapolated
~1600 for parity, QPS roughly halved to ~227 — still ~+63% over the
inline α=1.2 row that crosses recall 0.95 at ef=800).

Next Gap #2 step: add an `oversample_factor` knob so the search
traverses with frontier_ef = oversample × user_ef, then end-of-search
rerank picks user_ef from the larger candidate set. This is the
qdrant `oversampling` parameter.
"""

