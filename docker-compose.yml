# CoordiNode — single-node development setup.
#
# Usage:
#   docker compose up -d
#   docker compose logs -f coordinode
#
# Ports:
#   7080 — gRPC (native API)
#   7081 — REST/JSON (embedded structured-proxy inside coordinode binary)
#   7084 — Prometheus /metrics, /health, /ready

services:
  coordinode:
    build: .
    image: coordinode:latest
    container_name: coordinode
    ports:
      - "7080:7080"   # gRPC
      - "7081:7081"   # REST/JSON (embedded proxy, same binary)
      - "7084:7084"   # Prometheus /metrics, /health
    volumes:
      - coordinode-data:/data
    environment:
      - COORDINODE_LOG_FORMAT=json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/coordinode", "version"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  coordinode-data:
    driver: local
