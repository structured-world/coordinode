# CoordiNode — single-node development setup.
#
# Usage:
#   docker compose up -d
#   docker compose logs -f coordinode
#
# Ports:
#   7080 — gRPC (native API)
#   7081 — REST/JSON (gRPC-to-REST transcoding via structured-proxy)
#   7084 — Prometheus /metrics, /health, /ready

services:
  coordinode:
    build: .
    image: coordinode:latest
    container_name: coordinode
    ports:
      - "7080:7080"   # gRPC
      - "7081:7081"   # REST/JSON (via rest-proxy, shares network namespace)
      - "7084:7084"   # Prometheus /metrics, /health
    volumes:
      - coordinode-data:/data
    environment:
      - COORDINODE_LOG_FORMAT=json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/coordinode", "version"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  rest-proxy:
    build: .
    image: coordinode:latest
    container_name: coordinode-rest
    entrypoint: ["/structured-proxy"]
    command: ["--config", "/etc/proxy/coordinode-proxy.yaml"]
    # Share the network namespace with coordinode so that upstream
    # http://127.0.0.1:7080 in coordinode-proxy.yaml resolves correctly.
    network_mode: "service:coordinode"
    volumes:
      - ./coordinode-proxy.yaml:/etc/proxy/coordinode-proxy.yaml:ro
      - ./coordinode.descriptor.bin:/etc/proxy/coordinode.descriptor.bin:ro
    depends_on:
      coordinode:
        condition: service_healthy
    restart: unless-stopped

volumes:
  coordinode-data:
    driver: local
