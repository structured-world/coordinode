name: Release PLZ

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-plz-fork

      # We build release-plz from our own fork which patches the git_only cargo
      # package fallback bug (upstream issue #2595). Upstream v0.3.157 runs
      # `cargo package --workspace` against the baseline tag checkout and fails
      # when `[workspace.dependencies]` path entries don't have a version field
      # at that commit. Our fork falls back to a source-directory comparator.
      #
      # When upstream release-plz ships a proper fix, this step should be
      # replaced with `uses: release-plz/action@v0.5` again.
      - name: Install forked release-plz
        run: |
          cargo install --git https://github.com/structured-world/release-plz.git \
            --branch 'feat/#2791-workspace-changelog' \
            --locked \
            release-plz

      - name: Run release-plz release
        # Runs first so the git tag exists before release-pr computes the next
        # version. Running release-pr first caused duplicate release PRs: it saw
        # the old tag and proposed the same version again (e.g. 0.3.3→0.3.4 twice).
        # No-op on feature pushes; expected to exit 0 before a release PR is merged.
        continue-on-error: true
        run: |
          release-plz release \
            --git-token "${GITHUB_TOKEN}" \
            --config .release-plz.toml \
            --verbose
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Fetch tags after release
        # release-plz release creates tags via GitHub API (not git tag + push),
        # so the local git clone does not see the new tag after the previous step.
        # Without this fetch, release-pr queries local tags, finds the old tag,
        # and generates a duplicate release PR (e.g. 0.3.4→0.3.5 when already at 0.3.5).
        run: git fetch --tags

      - name: Run release-plz release-pr
        run: |
          release-plz release-pr \
            --git-token "${GITHUB_TOKEN}" \
            --config .release-plz.toml \
            --verbose
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Split workspace changelog into per-crate files
        # Regenerates crates/*/CHANGELOG.md from the workspace CHANGELOG.md.
        # Library crates have release=false so release-plz never updates their
        # per-crate files. This step derives them from the workspace changelog
        # (which release-plz keeps current) and commits the result to main.
        # The commit uses "chore:" prefix so release-plz skips it.
        # No-op on non-release pushes (git diff --quiet exits 0, step skipped).
        continue-on-error: true
        run: |
          python3 scripts/split-changelog.py
          git diff --quiet && exit 0
          git config user.name "sw-release-bot[bot]"
          git config user.email "255865126+sw-release-bot[bot]@users.noreply.github.com"
          git add crates/*/CHANGELOG.md scripts/split-changelog.py
          git commit -m "chore(changelog): regenerate per-crate changelogs from workspace"
          git push
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
