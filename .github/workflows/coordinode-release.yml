name: Release PLZ

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release-pr
        # continue-on-error: release-plz runs `cargo package` for change detection
        # even with `git_only = true`. For monorepos where crates have internal
        # path dependencies not published to crates.io, this always fails.
        # TODO: replace with git-cliff + custom version bump script.
        continue-on-error: true
        uses: release-plz/action@v0.5
        with:
          command: release-pr
          config: .release-plz.toml
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Run release-plz release
        uses: release-plz/action@v0.5
        continue-on-error: true  # no-op until Release PR is merged; expected to fail before that
        with:
          command: release
          config: .release-plz.toml
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
