name: Release PLZ

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release
        # Creates git tags + GitHub Releases for crates whose version bump was
        # merged to main. No-op on feature pushes. Runs first so the tag exists
        # before release-pr computes the next version (avoids duplicate PRs).
        continue-on-error: true
        uses: release-plz/action@v0.5
        with:
          command: release
          config: .release-plz.toml
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Fetch tags after release
        # release-plz release creates tags via GitHub API (not git tag + push),
        # so the local git clone does not see the new tag after the previous step.
        # Without this fetch, release-pr queries local tags, finds the old tag,
        # and generates a duplicate release PR.
        run: git fetch --tags

      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
          config: .release-plz.toml
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
