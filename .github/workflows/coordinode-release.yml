name: Release PLZ

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-plz-fork

      # Forked release-plz: patches the `cargo package` fallback for baseline
      # checkouts whose `[workspace.dependencies]` entries lack a `version`
      # field (upstream issue #2595). Without this, release-pr fails on the
      # first run after any workspace refactor that changes dep declarations.
      #
      # When upstream ships the fix, swap this step for `release-plz/action@v0.5`.
      - name: Install forked release-plz
        run: |
          cargo install --git https://github.com/structured-world/release-plz.git \
            --branch 'feat/#2791-workspace-changelog' \
            --locked \
            release-plz

      - name: Run release-plz release
        # Runs first so the git tag exists before release-pr computes the next
        # version. Running release-pr first caused duplicate release PRs: it saw
        # the old tag and proposed the same version again.
        # No-op on feature pushes; expected to exit 0 before a release PR is merged.
        continue-on-error: true
        run: |
          release-plz release \
            --git-token "${GITHUB_TOKEN}" \
            --config .release-plz.toml \
            --verbose
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Fetch tags after release
        # release-plz release creates tags via GitHub API (not git tag + push),
        # so the local git clone does not see the new tag after the previous step.
        # Without this fetch, release-pr queries local tags, finds the old tag,
        # and generates a duplicate release PR.
        run: git fetch --tags

      - name: Run release-plz release-pr
        run: |
          release-plz release-pr \
            --git-token "${GITHUB_TOKEN}" \
            --config .release-plz.toml \
            --verbose
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
