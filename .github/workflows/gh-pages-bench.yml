# Build and deploy the bench dashboard to GitHub Pages.
#
# Triggered when either:
#   1. New bench results land in bench-results/ (the bench
#      workflow's auto-commit hits main), OR
#   2. The dashboard frontend itself (docs/bench/**) changes
#
# Output: docs/bench/ + a generated data/index.json manifest
# listing every BenchReport JSON, deployed to GitHub Pages as a
# static site.

name: gh-pages-bench

on:
  push:
    branches: [main]
    paths:
      - 'bench-results/**'
      - 'docs/bench/**'
      - '.github/workflows/gh-pages-bench.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time. Cancel in-progress runs when a newer
# bench commit lands — the latest data wins.
concurrency:
  group: gh-pages-bench
  cancel-in-progress: true

jobs:
  build:
    name: Build manifest + assemble site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build manifest (data/index.json)
        run: |
          set -euo pipefail
          OUT=docs/bench-site
          mkdir -p "$OUT/data"
          cp -R docs/bench/* "$OUT/"
          # Copy every bench-results JSON under the site root so
          # the dashboard's fetch(path) calls resolve relative to
          # the deployed site. Preserve <modality>/<dataset>/ tree.
          if [ -d bench-results ]; then
            mkdir -p "$OUT/bench-results"
            cp -R bench-results/* "$OUT/bench-results/" 2>/dev/null || true
          fi
          # Walk bench-results/, collect every .json into a flat
          # manifest. Each entry: {path, modality, dataset, subject,
          # sha, sha_short, timestamp}. The dashboard uses this to
          # decide which files to fetch (no recursive directory
          # crawling at runtime).
          python3 - "$OUT" <<'EOF'
          import json, os, sys
          from pathlib import Path

          out = Path(sys.argv[1])
          entries = []
          src = Path('bench-results')
          if src.exists():
              for p in src.rglob('*.json'):
                  try:
                      data = json.loads(p.read_text())
                  except Exception as e:
                      print(f"::warning::skipping unreadable {p}: {e}")
                      continue
                  if not isinstance(data, dict) or 'schema_version' not in data:
                      continue
                  # Path the dashboard will fetch — relative to the
                  # site root. We mirrored bench-results/ under the
                  # site so a single 'bench-results/...' path works.
                  rel = p.relative_to('.').as_posix()
                  entries.append({
                      'path': rel,
                      'modality': data.get('modality'),
                      'dataset': data.get('dataset'),
                      'subject': data.get('subject'),
                      'sha': (data.get('git') or {}).get('sha'),
                      'sha_short': (data.get('git') or {}).get('sha_short'),
                      'timestamp': data.get('timestamp'),
                  })
          manifest = {'schema_version': 1, 'entries': entries}
          (out / 'data' / 'index.json').write_text(json.dumps(manifest, indent=2))
          print(f"manifest: {len(entries)} entries")
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/bench-site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
