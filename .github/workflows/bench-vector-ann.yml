# ann-benchmarks Docker harness — measures CoordiNode HNSW vs library-tier
# engines (hnswlib / FAISS / ScaNN / Annoy) on the canonical
# ann-benchmarks.com datasets. Pushes the result JSON to the `bench-data`
# orphan branch so the docs site picks it up.
#
# The self-hosted gpu-private-systems runner IS the bench host —
# `/opt/coordinode` is the long-lived checkout, `/opt/annb/ann-benchmarks`
# is the harness install with cached Docker images for every competitor,
# coordinode-python wheel cache is on the same disk. Everything happens
# on the runner; no ssh / no rsync.

name: bench-vector-ann

on:
  push:
    branches: [main]
    paths:
      - 'crates/coordinode-core/**'
      - 'crates/coordinode-vector/**'
      - 'benches/ann-benchmarks-adapter/**'
      - 'scripts/ann-benchmarks-to-json.py'
      - 'scripts/run-coordinode-ann-benchmarks.sh'
      - '.github/workflows/bench-vector-ann.yml'
  workflow_dispatch:
    inputs:
      datasets:
        description: 'Comma-separated ann-benchmarks dataset names'
        required: false
        default: 'glove-25-angular,sift-128-euclidean,nytimes-256-angular,fashion-mnist-784-euclidean'

concurrency:
  group: bench
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bench:
    runs-on:
      - self-hosted
      - gpu-private-systems
    timeout-minutes: 360

    steps:
      - name: Sync /opt/coordinode to this SHA + run ann-benchmarks + push results
        run: |
          set -euo pipefail
          # See bench-vdbbench.yml for the safe.directory rationale.
          git config --global --add safe.directory /opt/coordinode
          cd /opt/coordinode
          git fetch origin main
          git checkout "$GITHUB_SHA"
          git submodule update --init --recursive
          bash scripts/run-coordinode-ann-benchmarks.sh \
            --sha "$GITHUB_SHA" \
            --datasets "$DATASETS"
          bash scripts/push-bench-data.sh
        env:
          GITHUB_SHA: ${{ github.sha }}
          DATASETS: ${{ inputs.datasets || 'glove-25-angular,sift-128-euclidean,nytimes-256-angular,fashion-mnist-784-euclidean' }}
          COMMIT_MSG: "chore(bench): ann-benchmarks results @ ${{ github.sha }}"
