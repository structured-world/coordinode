# ann-benchmarks Docker harness bench — CoordiNode vs library-tier engines.
#
# Companion to `bench.yml` (which runs the Rust-side criterion-driven
# vector-ann harness on gpu1).  This workflow drives the canonical
# ann-benchmarks Docker harness on a dedicated bench host (ro /
# 192.168.1.200) so the resulting numbers are directly comparable with
# what hnswlib / FAISS / Annoy / ScaNN / Qdrant / Milvus / Weaviate /
# pgvector publish on ann-benchmarks.com.
#
# Each push to main:
#   1. Builds the coordinode-embedded PyO3 wheel against the SHA being benched
#      (submodule swap in the public coordinode-python repo)
#   2. Stages the wheel + adapter (`benches/ann-benchmarks-adapter/`) into
#      the ann-benchmarks workspace on ro
#   3. Runs the ann-benchmarks Docker image for CoordiNode on the documented
#      dataset ladder
#   4. Exports per-(dataset, M) JSONs into `bench-results/vector/`
#   5. Force-pushes the merged tree to the `bench-data` orphan branch
#
# RUNNER PREREQUISITE — bench-host-ro is not yet registered as a self-hosted
# GitHub Actions runner on the structured-world org.  Until ro is registered
# (see /servers skill notes), this workflow will sit idle.  Until then, run
# the orchestrator manually:
#
#   ssh root@192.168.1.200 'cd /opt/coordinode && \
#     scripts/run-coordinode-ann-benchmarks.sh --sha $(git rev-parse HEAD)'

name: bench-vector-ann

on:
  push:
    branches: [main]
    paths:
      - 'crates/coordinode-core/**'
      - 'crates/coordinode-vector/**'
      - 'benches/ann-benchmarks-adapter/**'
      - 'scripts/ann-benchmarks-to-json.py'
      - 'scripts/run-coordinode-ann-benchmarks.sh'
      - '.github/workflows/bench-vector-ann.yml'
  workflow_dispatch:
    inputs:
      datasets:
        description: 'Comma-separated ann-benchmarks dataset names'
        required: false
        default: 'glove-25-angular,sift-128-euclidean,nytimes-256-angular,fashion-mnist-784-euclidean'

# Share the same concurrency group as `bench.yml` — they both push to
# `bench-data` with force, and serialising prevents lost commits.
concurrency:
  group: bench
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bench:
    name: ann-benchmarks (Docker, ro)
    runs-on:
      - self-hosted
      - bench-host-ro
    timeout-minutes: 360       # full dataset ladder × 9 M values × 9 ef = hours

    env:
      ANNB_ROOT: /opt/annb/ann-benchmarks
      COORDINODE_REPO: /opt/coordinode
      COORDINODE_PYTHON_REPO: /opt/coordinode-python
      DATASETS: ${{ inputs.datasets || 'glove-25-angular,sift-128-euclidean,nytimes-256-angular,fashion-mnist-784-euclidean' }}

    steps:
      - name: Checkout coordinode @ SHA
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          path: coordinode-src

      - name: Sync coordinode to runner cache
        # The orchestrator works against a long-lived checkout on the runner
        # so cargo / docker layer caches persist across runs.  We rsync the
        # action checkout (which is at the SHA we want) into that location.
        run: |
          set -euo pipefail
          rsync -a --delete \
            --exclude='.git/objects/pack/' \
            coordinode-src/ "$COORDINODE_REPO/"
          # Carry the .git so subsequent git operations on the runner
          # checkout know about origin and the SHA.
          rsync -a coordinode-src/.git/ "$COORDINODE_REPO/.git/"

      - name: Run ann-benchmarks
        run: |
          set -euo pipefail
          bash "$COORDINODE_REPO/scripts/run-coordinode-ann-benchmarks.sh" \
            --sha "${{ github.sha }}" \
            --datasets "$DATASETS"

      - name: Stage results into action workspace
        # The orchestrator writes to $COORDINODE_REPO/bench-results/; copy
        # back into the GitHub Actions workspace so the next step can use
        # the standard `git status` checks.
        run: |
          set -euo pipefail
          mkdir -p coordinode-src/bench-results
          cp -R "$COORDINODE_REPO/bench-results/." coordinode-src/bench-results/

      - name: Push results to bench-data branch
        working-directory: coordinode-src
        run: |
          bash scripts/push-bench-data.sh
        env:
          COMMIT_MSG: "chore(bench): ann-benchmarks results @ ${{ github.sha }}"

      - name: Upload workflow artifact (90-day retention)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-vector-ann-${{ github.sha }}
          path: coordinode-src/bench-results/vector/**/*.json
          retention-days: 90
          if-no-files-found: warn
