name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Override rust-toolchain.toml MSRV — dependencies require Rust 1.90+.
  RUSTUP_TOOLCHAIN: stable

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install protobuf compiler (skip if present)
        # `protoc` is preinstalled on the self-hosted runner (Fedora,
        # uses dnf — apt-get would not exist there and `sudo apt-get`
        # would prompt for a password the workflow can't supply).
        # GH-hosted ubuntu-latest still needs the install.
        run: |
          if command -v protoc >/dev/null 2>&1; then
            echo "protoc already installed: $(protoc --version)"
          else
            sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev
          fi
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (zero warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    # GH-hosted ubuntu-latest has ~14 GB disk which the full workspace
    # debug build exceeds (linker hits "No space left on device"). Moved
    # to the org's self-hosted runner where target/ has room.
    runs-on:
      - self-hosted
      - gpu-private-systems
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protobuf compiler (skip if present)
        # `protoc` is preinstalled on the self-hosted runner (Fedora,
        # uses dnf — apt-get would not exist there and `sudo apt-get`
        # would prompt for a password the workflow can't supply).
        # GH-hosted ubuntu-latest still needs the install.
        run: |
          if command -v protoc >/dev/null 2>&1; then
            echo "protoc already installed: $(protoc --version)"
          else
            sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev
          fi
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Build coordinode binary (required by integration tests)
        run: cargo build -p coordinode-server --all-features
      - name: Run unit + integration tests (nextest)
        # The self-hosted runner is shared (CI, bench, and HNSW workflows can
        # run concurrently), so CPU oversubscription can starve Raft heartbeats
        # and trigger spurious elections in the election-timing-sensitive cluster
        # tests. Give those tests generous election timeouts; production timeouts
        # (300-600ms) are unchanged.
        env:
          COORDINODE_TEST_RAFT_GENEROUS_TIMEOUTS: "1"
        run: cargo nextest run --all-features --workspace
      - name: Run doc tests
        run: cargo test --doc --all-features

  build:
    name: Build
    # See `test` job — release build is even larger than debug, won't
    # fit on GH-hosted runner disk.
    runs-on:
      - self-hosted
      - gpu-private-systems
    needs: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protobuf compiler (skip if present)
        # `protoc` is preinstalled on the self-hosted runner (Fedora,
        # uses dnf — apt-get would not exist there and `sudo apt-get`
        # would prompt for a password the workflow can't supply).
        # GH-hosted ubuntu-latest still needs the install.
        run: |
          if command -v protoc >/dev/null 2>&1; then
            echo "protoc already installed: $(protoc --version)"
          else
            sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev
          fi
      - uses: Swatinem/rust-cache@v2
      - name: Build (release)
        run: cargo build --release --all-features

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          arguments: --all-features
