# VDBBench (Zilliz) gRPC-tier benchmark — runs coordinode-server at
# the freshly-pushed SHA against real LLM-embedding datasets
# (OpenAI 1536d / Cohere 768d / Bioasq 1024d).
#
# Architecture:
#   * Runner: `gpu-private-systems` (the org-level self-hosted runner).
#   * Bench host: <redacted> — has coordinode-server build cache,
#     VDBBench checkout, dataset cache. The runner ssh's there to do
#     the actual bench work, then scp's results back.
#
# Trigger:
#   Push to main that touches anything affecting vector-search hot path
#   (engine crates) or the benchmark scaffolding itself.

name: bench-vdbbench

on:
  push:
    branches: [main]
    paths:
      - 'crates/coordinode-core/**'
      - 'crates/coordinode-vector/**'
      - 'crates/coordinode-storage/**'
      - 'crates/coordinode-query/**'
      - 'crates/coordinode-server/**'
      - 'benches/vdbbench-adapter/**'
      - 'scripts/vdbbench-to-json.py'
      - 'scripts/run-coordinode-vdbbench.sh'
      - '.github/workflows/bench-vdbbench.yml'
  workflow_dispatch:
    inputs:
      cases:
        description: 'Comma-separated VDBBench case-type names'
        required: false
        default: 'Performance1536D50K'

# Share the `bench` concurrency group with bench-vector-ann.yml so the
# two never push to bench-data simultaneously and clobber each other's
# tree.
concurrency:
  group: bench
  cancel-in-progress: false

permissions:
  contents: write

env:
  # ssh target — bench host owns the long-lived /opt/coordinode checkout,
  # VDBBench install, and dataset cache (downloads from VDBBench's S3 are
  # cached across runs).
  BENCH_HOST: <redacted>
  BENCH_USER: root
  # accept-new: trust the host's key the first time we see it, but reject
  # if the fingerprint ever changes (MITM guard). Set instead of off so
  # we don't silently accept a swapped host on a subsequent run.
  SSH_OPTS: "-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
  RSYNC_RSH: "ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=$HOME/.ssh/known_hosts"

jobs:
  bench:
    name: VDBBench (gRPC, bench-host-ro)
    runs-on:
      - self-hosted
      - gpu-private-systems
    timeout-minutes: 480       # smoke ~10 min; larger cases hours

    steps:
      - name: Checkout coordinode @ SHA
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          submodules: recursive

      - name: Sync scripts + adapter to bench host
        run: |
          set -euo pipefail
          # Push the SHA-pinned scripts + adapter to the bench host's
          # coordinode checkout so the orchestrator (run-coordinode-vdbbench.sh)
          # runs the exact code from this commit, not whatever lives on
          # /opt/coordinode from a prior run.
          rsync -a --delete \
            scripts/vdbbench-to-json.py \
            scripts/run-coordinode-vdbbench.sh \
            "${BENCH_USER}@${BENCH_HOST}:/opt/coordinode/scripts/"
          rsync -a --delete \
            benches/vdbbench-adapter/ \
            "${BENCH_USER}@${BENCH_HOST}:/opt/coordinode/benches/vdbbench-adapter/"

      - name: Pin bench host's coordinode to this SHA + run VDBBench
        run: |
          set -euo pipefail
          ssh $SSH_OPTS "${BENCH_USER}@${BENCH_HOST}" bash <<'EOF'
          set -euo pipefail
          cd /opt/coordinode
          # Run the orchestrator — it handles checkout, build, server,
          # VDBBench, and JSON conversion.
          bash scripts/run-coordinode-vdbbench.sh \
            --sha "${GITHUB_SHA}" \
            --cases "${BENCH_CASES}"
          EOF
        env:
          GITHUB_SHA: ${{ github.sha }}
          BENCH_CASES: ${{ inputs.cases || 'Performance1536D50K' }}

      - name: Pull bench-results JSON from bench host
        run: |
          set -euo pipefail
          mkdir -p bench-results
          rsync -a \
            "${BENCH_USER}@${BENCH_HOST}:/opt/coordinode/bench-results/vector/" \
            bench-results/vector/

      - name: Push results to bench-data branch
        run: |
          bash scripts/push-bench-data.sh
        env:
          COMMIT_MSG: "chore(bench): VDBBench results @ ${{ github.sha }}"

      - name: Upload workflow artifact (90-day retention)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-vdbbench-${{ github.sha }}
          path: bench-results/vector/**/*.json
          retention-days: 90
          if-no-files-found: warn
