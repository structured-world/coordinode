# VDBBench (Zilliz) gRPC-tier benchmark — runs coordinode-server at
# the freshly-pushed SHA against real LLM-embedding datasets
# (OpenAI 1536d / Cohere 768d / Bioasq 1024d). Pushes the result JSON
# to the `bench-data` orphan branch so the docs site picks it up.
#
# The self-hosted gpu-private-systems runner IS the bench host —
# `/opt/coordinode` is the long-lived checkout, `/opt/vdbbench` is the
# VDBBench install, coordinode-server build cache is on the same disk.
# Everything happens on the runner; no ssh / no rsync.

name: bench-vdbbench

on:
  push:
    branches: [main]
    paths:
      - 'crates/coordinode-core/**'
      - 'crates/coordinode-vector/**'
      - 'crates/coordinode-storage/**'
      - 'crates/coordinode-query/**'
      - 'crates/coordinode-server/**'
      - 'benches/vdbbench-adapter/**'
      - 'scripts/vdbbench-to-json.py'
      - 'scripts/run-coordinode-vdbbench.sh'
      - '.github/workflows/bench-vdbbench.yml'
  workflow_dispatch:
    inputs:
      cases:
        description: 'Comma-separated VDBBench case-type names'
        required: false
        default: 'Performance1536D50K'

# Share the `bench` concurrency group with bench-vector-ann.yml so the
# two workflows never push to bench-data simultaneously.
concurrency:
  group: bench
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bench:
    runs-on:
      - self-hosted
      - gpu-private-systems
    timeout-minutes: 480

    steps:
      - name: Sync /opt/coordinode to this SHA + run VDBBench + push results
        run: |
          set -euo pipefail
          # `/opt/coordinode` is owned by the operator who set up the
          # bench host; the GHA runner runs under a different user.
          # Git ≥ 2.36 refuses to operate on such trees unless they
          # are marked safe — declare it once per job (idempotent).
          git config --global --add safe.directory /opt/coordinode
          cd /opt/coordinode
          git fetch origin main
          git checkout "$GITHUB_SHA"
          git submodule update --init --recursive
          bash scripts/run-coordinode-vdbbench.sh \
            --sha "$GITHUB_SHA" \
            --cases "$BENCH_CASES"
          bash scripts/push-bench-data.sh
        env:
          GITHUB_SHA: ${{ github.sha }}
          BENCH_CASES: ${{ inputs.cases || 'Performance1536D50K' }}
          COMMIT_MSG: "chore(bench): VDBBench results @ ${{ github.sha }}"
