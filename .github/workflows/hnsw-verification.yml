name: Lock-free HNSW verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'crates/coordinode-vector/**'
      - '.github/workflows/miri.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  miri-neighbours:
    name: Miri — AtomicNeighbourList primitives
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install nightly toolchain with miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev

      - uses: Swatinem/rust-cache@v2

      - name: Run miri on hnsw::neighbours::tests
        # The neighbours module holds every atomic primitive of the lock-free
        # HNSW write path (cas_append, snapshot_into, set, replace). Miri
        # scans the abstract Rust machine for undefined behaviour — bad
        # atomic orderings, uninitialised reads, type-punning aliasing, etc.
        # Higher-level integration tests use rayon and would time out under
        # miri; they are covered by the proptest stress in the regular CI
        # job and the loom job below.
        env:
          MIRIFLAGS: -Zmiri-disable-isolation -Zmiri-permissive-provenance
        run: |
          cd crates/coordinode-vector
          cargo +nightly miri test --lib hnsw::neighbours::tests --no-fail-fast

  loom-neighbours:
    name: Loom — AtomicNeighbourList interleavings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          # Loom uses a different build cfg, so cache separately from the
          # regular build to avoid recompile churn on the main test job.
          key: loom

      - name: Run loom interleaving suite
        # Loom permutes every observable order of atomic operations on the
        # lock-free HNSW primitives — exhaustive verification that:
        #
        # * AtomicNeighbourList — Acquire/Release pairing on `len`
        #   correctly publishes slot writes to any subsequent reader,
        #   and `cas_append` never loses writes under concurrent senders.
        # * EntryPoint — packed `(level, idx)` CAS-loop honours the
        #   layer-promotion linearisability invariant from
        #   arch/search/vector-parallel-insert.md §"Layer-promotion
        #   linearisability": after every legal interleaving of two
        #   concurrent `try_promote` callers, exactly one Installs on
        #   the seed race, the highest level always wins on a mixed
        #   race, and equal-level races are idempotent.
        #
        # Each test binary is invoked separately because loom is
        # nondeterministic-fail when binaries share global state across
        # `loom::model` runs in the same process.
        env:
          RUSTFLAGS: --cfg loom
        run: |
          cargo nextest run \
            --test loom_neighbours \
            --release \
            -p coordinode-vector \
            --no-fail-fast
          cargo nextest run \
            --test loom_entry_point \
            --release \
            -p coordinode-vector \
            --no-fail-fast
