name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build (e.g. v0.1.0-alpha.1)"
        required: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  REGISTRY: ghcr.io
  TAG_NAME: ${{ github.event.release.tag_name || inputs.tag_name }}
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  build-musl:
    name: Build musl (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: coordinode-linux-amd64
          - target: aarch64-unknown-linux-musl
            artifact: coordinode-linux-arm64
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"
          targets: ${{ matrix.target }}

      - name: Install musl tools + protobuf
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools protobuf-compiler libprotobuf-dev

      - name: Install cross-compilation toolchain (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build static binary
        env:
          # musl cross-compile: disable glibc fortify so zstd C code doesn't
          # reference __memcpy_chk / __memset_chk which don't exist in musl.
          CFLAGS_aarch64_unknown_linux_musl: "-D_FORTIFY_SOURCE=0"
          CFLAGS_x86_64_unknown_linux_musl: "-D_FORTIFY_SOURCE=0"
        run: |
          cargo build --release --target ${{ matrix.target }} --bin coordinode
          strip target/${{ matrix.target }}/release/coordinode || true

      - name: Package
        run: |
          VERSION=${{ env.TAG_NAME }}
          cp target/${{ matrix.target }}/release/coordinode coordinode-${VERSION}-${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: coordinode-${{ env.TAG_NAME }}-${{ matrix.artifact }}
          retention-days: 1

      - name: Attach binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: coordinode-${{ env.TAG_NAME }}-${{ matrix.artifact }}

  docker:
    name: Build + push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.TAG_NAME }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.TAG_NAME }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
