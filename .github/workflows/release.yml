name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build (e.g. v0.1.0-alpha.1)"
        required: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  REGISTRY: ghcr.io
  TAG_NAME: ${{ github.event.release.tag_name || inputs.tag_name }}
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  build-musl:
    name: Build musl (${{ matrix.target }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: coordinode-linux-amd64
            runs-on: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            artifact: coordinode-linux-arm64
            runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"
          targets: ${{ matrix.target }}

      - name: Install musl tools + protobuf
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools protobuf-compiler libprotobuf-dev

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build static binary
        env:
          # musl cross-compile: disable glibc fortify so zstd C code doesn't
          # reference __memcpy_chk / __memset_chk which don't exist in musl.
          CFLAGS_aarch64_unknown_linux_musl: "-D_FORTIFY_SOURCE=0"
          CFLAGS_x86_64_unknown_linux_musl: "-D_FORTIFY_SOURCE=0"
        run: |
          cargo build --release --target ${{ matrix.target }} --bin coordinode
          strip target/${{ matrix.target }}/release/coordinode || true

      - name: Package
        run: |
          VERSION=${{ env.TAG_NAME }}
          cp target/${{ matrix.target }}/release/coordinode coordinode-${VERSION}-${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: coordinode-${{ env.TAG_NAME }}-${{ matrix.artifact }}
          retention-days: 1

      - name: Attach binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: coordinode-${{ env.TAG_NAME }}-${{ matrix.artifact }}

  package:
    name: Build deb/rpm packages
    runs-on: ubuntu-latest
    needs: build-musl
    steps:
      - uses: actions/checkout@v6

      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: coordinode-linux-amd64
          path: /tmp/bins/amd64/

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: coordinode-linux-arm64
          path: /tmp/bins/arm64/

      - name: Install nfpm
        run: |
          curl -sfL https://raw.githubusercontent.com/goreleaser/nfpm/main/godownloader.sh \
            | bash -s -- -b /usr/local/bin v2.40.0

      - name: Prepare binaries
        run: |
          VERSION=$(echo "${{ env.TAG_NAME }}" | sed 's/^v//')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          # Rename artifact files to plain 'coordinode' for nfpm
          mv /tmp/bins/amd64/coordinode-*-coordinode-linux-amd64 /tmp/bins/amd64/coordinode || \
            cp /tmp/bins/amd64/* /tmp/bins/amd64/coordinode 2>/dev/null || true
          mv /tmp/bins/arm64/coordinode-*-coordinode-linux-arm64 /tmp/bins/arm64/coordinode || \
            cp /tmp/bins/arm64/* /tmp/bins/arm64/coordinode 2>/dev/null || true
          chmod +x /tmp/bins/amd64/coordinode /tmp/bins/arm64/coordinode
          ls -la /tmp/bins/amd64/ /tmp/bins/arm64/

      - name: Build DEB packages
        run: |
          mkdir -p /tmp/pkgs/deb
          for arch in amd64 arm64; do
            # nfpm uses GOARCH-style names
            GOARCH=$arch VERSION="$VERSION" BINARY="/tmp/bins/$arch/coordinode" \
              nfpm package --config packaging/nfpm.yaml --packager deb --target /tmp/pkgs/deb/
          done
          ls -la /tmp/pkgs/deb/

      - name: Build RPM packages (x86_64)
        run: |
          mkdir -p /tmp/pkgs/rpm-base
          GOARCH=amd64 VERSION="$VERSION" BINARY="/tmp/bins/amd64/coordinode" \
            nfpm package --config packaging/nfpm.yaml --packager rpm --target /tmp/pkgs/rpm-base/
          # Extract the base RPM name and create per-Fedora-version copies
          BASE_RPM=$(ls /tmp/pkgs/rpm-base/*.rpm | head -1)
          BASE_NAME=$(basename "$BASE_RPM" .rpm)
          for FC in 40 41 42; do
            mkdir -p "/tmp/pkgs/rpm-fc${FC}"
            cp "$BASE_RPM" "/tmp/pkgs/rpm-fc${FC}/${BASE_NAME}.fc${FC}.x86_64.rpm"
          done
          ls -la /tmp/pkgs/rpm-fc*/

      - name: Stage artifacts by distro
        run: |
          # DEB: same binary works on all distros — one dir per codename
          for codename in jammy noble bookworm; do
            mkdir -p "/tmp/artifacts/deb-${codename}"
            cp /tmp/pkgs/deb/*_amd64.deb "/tmp/artifacts/deb-${codename}/" 2>/dev/null || true
            cp /tmp/pkgs/deb/*_arm64.deb "/tmp/artifacts/deb-${codename}/" 2>/dev/null || true
          done
          # RPM: per-Fedora-version directories
          for FC in 40 41 42; do
            mkdir -p "/tmp/artifacts/rpm-fc${FC}"
            cp "/tmp/pkgs/rpm-fc${FC}/"*.rpm "/tmp/artifacts/rpm-fc${FC}/"
          done
          # Manifest for repo.sw.foundation docs
          mkdir -p /tmp/artifacts/repo-meta-coordinode
          cp packaging/manifest.json /tmp/artifacts/repo-meta-coordinode/

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-jammy
          path: /tmp/artifacts/deb-jammy/

      - name: Upload deb-noble artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-noble
          path: /tmp/artifacts/deb-noble/

      - name: Upload deb-bookworm artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-bookworm
          path: /tmp/artifacts/deb-bookworm/

      - name: Upload rpm-fc40 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-fc40
          path: /tmp/artifacts/rpm-fc40/

      - name: Upload rpm-fc41 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-fc41
          path: /tmp/artifacts/rpm-fc41/

      - name: Upload rpm-fc42 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-fc42
          path: /tmp/artifacts/rpm-fc42/

      - name: Upload repo-meta artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-meta-coordinode
          path: /tmp/artifacts/repo-meta-coordinode/

      - name: Trigger repo publish
        env:
          GH_TOKEN: ${{ secrets.RELEASER_APP_TOKEN }}
        run: |
          gh api repos/structured-world/repo/dispatches \
            --method POST \
            -f event_type=publish-from-coordinode \
            -f client_payload[coordinode_run_id]="${{ github.run_id }}" \
            -f client_payload[coordinode_repo]="${{ github.repository }}"

  # Build per-platform images on native runners, then merge into a multi-arch manifest.
  # This avoids QEMU emulation (~90 min for arm64) — each platform builds natively (~15 min).
  docker-build:
    name: Build Docker image (${{ matrix.platform }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_NAME }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: Merge Docker manifest
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.TAG_NAME }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.TAG_NAME }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)
        working-directory: /tmp/digests
