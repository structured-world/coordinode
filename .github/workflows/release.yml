name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build (e.g. v0.1.0-alpha.1)"
        required: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  REGISTRY: ghcr.io
  TAG_NAME: ${{ github.event.release.tag_name || inputs.tag_name }}
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  # Extract release notes for this version from CHANGELOG.md (written by release-plz)
  # and update the GitHub Release body. Runs before binary builds so notes are ready early.
  update-changelog:
    name: Update release notes
    runs-on: ubuntu-latest
    # Notes update is cosmetic — a failure here must not block RPM /
    # deb / docker artifact builds. The `gh release edit` step has
    # been observed to fail intermittently on workflow_dispatch reruns
    # of an already-published tag; downstream jobs use `needs.*.result`
    # to ignore that.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Extract release notes for ${{ env.TAG_NAME }}
        run: |
          python3 - <<'PYEOF'
          import os, re

          tag = os.environ['TAG_NAME']
          try:
              with open('CHANGELOG.md') as f:
                  content = f.read()
          except FileNotFoundError:
              with open('/tmp/release-notes.md', 'w') as out:
                  out.write(f'Release {tag}\n')
              raise SystemExit(0)

          # Sections are separated by "---" lines or by the next "## v" header.
          escaped = re.escape(tag)
          pattern = rf'^## {escaped}[^\n]*\n(.*?)(?=\n---|\n## v|\Z)'
          m = re.search(pattern, content, re.MULTILINE | re.DOTALL)

          with open('/tmp/release-notes.md', 'w') as out:
              if m:
                  out.write(m.group(1).strip() + '\n')
              else:
                  out.write(f'Release {tag}\n')
          PYEOF

      - name: Update GitHub Release body
        run: gh release edit "${{ env.TAG_NAME }}" --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-musl:
    name: Build musl (${{ matrix.target }})
    # Release-notes update is cosmetic and independent — don't gate
    # binary builds on it. docker-build / docker-manifest already run
    # in parallel for the same reason.
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: coordinode-linux-amd64
            runs-on: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            artifact: coordinode-linux-arm64
            runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
          targets: ${{ matrix.target }}

      - name: Install musl tools + protobuf
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools protobuf-compiler libprotobuf-dev

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build static binary
        run: |
          cargo build --release --target ${{ matrix.target }} --bin coordinode
          strip target/${{ matrix.target }}/release/coordinode || true

      - name: Package
        run: |
          VERSION=${{ env.TAG_NAME }}
          cp target/${{ matrix.target }}/release/coordinode coordinode-${VERSION}-${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: coordinode-${{ env.TAG_NAME }}-${{ matrix.artifact }}
          retention-days: 1

      - name: Attach binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: coordinode-${{ env.TAG_NAME }}-${{ matrix.artifact }}

  build-rpm:
    name: Build RPM (${{ matrix.fedora }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    needs: build-musl
    container:
      image: registry.fedoraproject.org/fedora:${{ matrix.fedora }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - fedora: "42"
            arch: x86_64
            runs-on: ubuntu-latest
            bin_artifact: coordinode-linux-amd64
          - fedora: "42"
            arch: aarch64
            runs-on: ubuntu-24.04-arm
            bin_artifact: coordinode-linux-arm64
          - fedora: "43"
            arch: x86_64
            runs-on: ubuntu-latest
            bin_artifact: coordinode-linux-amd64
          - fedora: "43"
            arch: aarch64
            runs-on: ubuntu-24.04-arm
            bin_artifact: coordinode-linux-arm64
          - fedora: "44"
            arch: x86_64
            runs-on: ubuntu-latest
            bin_artifact: coordinode-linux-amd64
          - fedora: "44"
            arch: aarch64
            runs-on: ubuntu-24.04-arm
            bin_artifact: coordinode-linux-arm64
    steps:
      - name: Install rpmbuild + helpers
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            rpm-build rpmdevtools systemd-rpm-macros findutils tar
          rpmdev-setuptree

      - uses: actions/checkout@v6

      - name: Download prebuilt binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.bin_artifact }}
          path: /tmp/bin/

      - name: Stage sources
        run: |
          VERSION=$(echo "${{ env.TAG_NAME }}" | sed 's/^v//')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          # Strip the version-prefixed name produced by build-musl down to plain `coordinode`.
          BIN=$(find /tmp/bin -type f -name 'coordinode-*' | head -1)
          install -m 0755 "$BIN" ~/rpmbuild/SOURCES/coordinode
          install -m 0644 packaging/coordinode.service   ~/rpmbuild/SOURCES/coordinode.service
          install -m 0644 packaging/coordinode.conf      ~/rpmbuild/SOURCES/coordinode.conf
          install -m 0644 packaging/coordinode.sysusers  ~/rpmbuild/SOURCES/coordinode.sysusers
          install -m 0644 packaging/coordinode.tmpfiles  ~/rpmbuild/SOURCES/coordinode.tmpfiles
          install -m 0644 LICENSE                        ~/rpmbuild/SOURCES/LICENSE
          install -m 0644 README.md                      ~/rpmbuild/SOURCES/README.md

      - name: Build RPM
        run: |
          rpmbuild -bb \
            --define "_topdir $HOME/rpmbuild" \
            --define "version $VERSION" \
            --target ${{ matrix.arch }} \
            packaging/rpm/coordinode.spec
          find ~/rpmbuild/RPMS -name '*.rpm' -print

      - name: Lint with rpmlint (advisory)
        continue-on-error: true
        run: |
          dnf install -y --setopt=install_weak_deps=False rpmlint || true
          rpmlint $(find ~/rpmbuild/RPMS -name '*.rpm') || true

      - name: Stage artifact
        run: |
          mkdir -p /tmp/artifacts
          cp ~/rpmbuild/RPMS/${{ matrix.arch }}/*.rpm /tmp/artifacts/

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-fc${{ matrix.fedora }}-${{ matrix.arch }}
          path: /tmp/artifacts/*.rpm
          if-no-files-found: error

      - name: Attach RPM to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: /tmp/artifacts/*.rpm

  build-deb:
    name: Build DEB (${{ matrix.codename }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    needs: build-musl
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - codename: bookworm
            image: debian:bookworm
            arch: amd64
            runs-on: ubuntu-latest
            bin_artifact: coordinode-linux-amd64
          - codename: bookworm
            image: debian:bookworm
            arch: arm64
            runs-on: ubuntu-24.04-arm
            bin_artifact: coordinode-linux-arm64
          - codename: jammy
            image: ubuntu:jammy
            arch: amd64
            runs-on: ubuntu-latest
            bin_artifact: coordinode-linux-amd64
          - codename: jammy
            image: ubuntu:jammy
            arch: arm64
            runs-on: ubuntu-24.04-arm
            bin_artifact: coordinode-linux-arm64
          - codename: noble
            image: ubuntu:noble
            arch: amd64
            runs-on: ubuntu-latest
            bin_artifact: coordinode-linux-amd64
          - codename: noble
            image: ubuntu:noble
            arch: arm64
            runs-on: ubuntu-24.04-arm
            bin_artifact: coordinode-linux-arm64
    steps:
      - name: Install debhelper + dpkg-dev
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          # build-essential satisfies the implicit Build-Depends pulled in by
          # debhelper-compat (= 13); without it dpkg-checkbuilddeps aborts.
          apt-get install -y --no-install-recommends \
            debhelper dpkg-dev dh-make ca-certificates findutils \
            build-essential adduser

      - uses: actions/checkout@v6

      - name: Download prebuilt binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.bin_artifact }}
          path: /tmp/bin/

      - name: Assemble source tree
        run: |
          VERSION=$(echo "${{ env.TAG_NAME }}" | sed 's/^v//')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          BUILD=/tmp/coordinode-$VERSION
          mkdir -p "$BUILD/packaging"
          # Stage the prebuilt binary as the canonical name expected by debian/rules.
          BIN=$(find /tmp/bin -type f -name 'coordinode-*' | head -1)
          install -m 0755 "$BIN" "$BUILD/coordinode"
          cp -r packaging/coordinode.service packaging/coordinode.conf \
                packaging/coordinode.sysusers packaging/coordinode.tmpfiles \
                "$BUILD/packaging/"
          cp -r packaging/deb/debian "$BUILD/"
          cp LICENSE README.md "$BUILD/"
          # Rewrite the placeholder changelog with the actual version.
          cat > "$BUILD/debian/changelog" <<CHANGELOG
          coordinode ($VERSION) unstable; urgency=medium

            * Automated release $VERSION; see CHANGELOG.md upstream.

           -- Release Bot <oss@sw.foundation>  $(date -R)
          CHANGELOG
          echo "BUILD_DIR=$BUILD" >> "$GITHUB_ENV"

      - name: Build DEB
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          dpkg-buildpackage -us -uc -b -a${{ matrix.arch }}
          ls -la ..

      - name: Lint with lintian (advisory)
        continue-on-error: true
        run: |
          apt-get install -y --no-install-recommends lintian || true
          lintian /tmp/coordinode_*_${{ matrix.arch }}.deb || true

      - name: Stage artifact
        run: |
          mkdir -p /tmp/artifacts
          cp /tmp/coordinode_${VERSION}_${{ matrix.arch }}.deb /tmp/artifacts/

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.codename }}-${{ matrix.arch }}
          path: /tmp/artifacts/*.deb
          if-no-files-found: error

      - name: Attach DEB to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: /tmp/artifacts/*.deb

  publish-repo:
    name: Publish to repo.sw.foundation
    runs-on: ubuntu-latest
    needs: [build-rpm, build-deb]
    steps:
      - uses: actions/checkout@v6

      - name: Repo metadata
        run: |
          mkdir -p /tmp/repo-meta
          cp packaging/manifest.json /tmp/repo-meta/

      - name: Upload repo-meta artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-meta-coordinode
          path: /tmp/repo-meta/

      - name: Generate release bot token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
          repositories: repo

      - name: Trigger repo publish
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/structured-world/repo/dispatches \
            --method POST \
            -f event_type=publish-from-coordinode \
            -f client_payload[coordinode_run_id]="${{ github.run_id }}" \
            -f client_payload[coordinode_repo]="${{ github.repository }}"

  # Build per-platform images on native runners, then merge into a multi-arch manifest.
  # This avoids QEMU emulation (~90 min for arm64) — each platform builds natively (~15 min).
  docker-build:
    name: Build Docker image (${{ matrix.platform }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            # amd64 Docker build moved to self-hosted runner — GH-hosted
            # ubuntu-latest disk too small for the full workspace cargo
            # build that the image's multi-stage Dockerfile performs.
            runs-on:
              - self-hosted
              - gpu-private-systems
          - platform: linux/arm64
            # arm64 stays on GH-hosted; we don't have an arm self-hosted runner.
            runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_NAME }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: Merge Docker manifest
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.TAG_NAME }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.TAG_NAME }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)
        working-directory: /tmp/digests
