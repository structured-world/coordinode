# Benchmark suite — all modalities, sequential, single self-hosted runner.
#
# CoordiNode benches ONE host at a time (<bench-runner> —
# org runner label `gpu-private-systems`). Splitting per modality
# into separate workflows is pointless: they share the box, the
# datasets directory, the CPU cores, and the build cache. Running
# them in one job means:
#
# - One `cargo build --release` for the whole workspace, reused
#   across every modality step
# - Sequential order — no contention for CPU/IO
# - Single commit at the end with the full batch of new JSONs
# - One concurrency lock — no two bench batches race
#
# Triggered ONLY by push to main. Competitor benches are NOT in
# this workflow — they run manually on the same runner per release
# (see benches/vector-ann/README.md).

name: bench

on:
  push:
    branches: [main]
    paths:
      # Any modality engine code, the shared harness, or any bench
      # binary triggers a full re-bench. Result-only commits don't
      # match (bench-results/ deliberately excluded).
      - 'crates/coordinode-core/**'
      - 'crates/coordinode-storage/**'
      - 'crates/coordinode-modality/**'
      - 'crates/coordinode-vector/**'
      - 'crates/coordinode-search/**'
      - 'crates/coordinode-query/**'
      - 'crates/coordinode-bench/**'
      - 'benches/*/src/**'
      - 'benches/*/Cargo.toml'
      - '.github/workflows/bench.yml'
  workflow_dispatch:
    inputs:
      modalities:
        description: 'Comma-separated modality names to run (default: all known). E.g. "vector" to re-bench only vector.'
        required: false
        default: 'vector'
      thread_sweep:
        description: 'Comma-separated rayon thread counts to sweep for the vector bench (each value re-runs the full per-commit smoke set). Empty / "default" = ST + MT4 sweep ("1,4"). Example: "1" for single-thread only.'
        required: false
        default: ''
      shard_sweep:
        description: 'Comma-separated n_shards values to sweep for the vector bench (each value re-runs the full per-commit smoke set as an independent shard fleet). Empty / "default" = single-shard ("1"); the bench harness collapses to today''s single-index control path when n_shards=1. Example: "1,2" produces a T1 ST + T2 MT4 baseline AND a T3 SHARD pair for E_node calculation. Push trigger keeps "1" so the lean per-commit budget is unaffected; manual runs opt into ">=2".'
        required: false
        default: ''
      shard_routing:
        description: 'Shard partitioning + routing strategy for n_shards > 1: "modulo" (default, geometry-blind id % N partitions, every query scatters to ALL shards = worst-case fan-out floor) or "centroid" (deterministic k-means partitions; each query routes only to the route_top_m closest shards = IVF-style routed fan-out).'
        required: false
        default: 'modulo'
      route_top_m:
        description: 'Fan-out width for shard_routing=centroid: each query searches only the m closest-centroid shards. "1" = max savings / lowest recall; equal to n_shards = scatter-all coverage on k-means partitions. Ignored for modulo routing.'
        required: false
        default: '1'
      subset_size:
        description: 'First N base vectors to use from each dataset (groundtruth recomputed brute-force). 50000 (default) keeps per-commit wall-clock under 20 min. Set to 100000+ for the full marketing matrix when full_sweep=true.'
        required: false
        default: '50000'
      full_sweep:
        description: 'Run the full marketing matrix (both datasets x f32+rabitq x RaBitQ rerank-oversample sweep). Off by default: push triggers a lean regression detector that must finish in 20 min. Manual runs can opt into the full matrix.'
        type: boolean
        required: false
        default: false
      high_d_probe:
        description: 'Add the gist-960-euclidean high-dimension dataset to the sweep. Only fires when the dataset is present on the runner — missing dataset = warning, not a failure. CN ST + MT4, M=16 f32. Adds ~10-15 min on top of the regular sweep.'
        type: boolean
        required: false
        default: false
      high_d_dimensions:
        description: 'Comma-list of embedding dimensions to bench from the high-D dataset tier (e.g. "1536,3072,4096,8192"). Each tier expects a fvecs triplet under $DATASET_ROOT/high-d/<d>/*_{base,query,groundtruth}.{fvecs,ivecs}; run benches/vector-ann/scripts/fetch_high_d.sh on the runner once to provision. Empty = skip. Runs ST + MT4 at M=16.'
        required: false
        default: ''

concurrency:
  group: bench
  cancel-in-progress: false  # bench runs are minutes-to-hours; never abort an in-flight batch

permissions:
  contents: write  # post-bench JSON commit to bench-results/

jobs:
  bench:
    name: All modalities (sequential)
    # Skip guard: commits whose message carries `[skip bench]` do not
    # queue a bench run. Use for yml-only / docs-only / non-perf edits
    # so the single self-hosted runner's queue is not serialised behind
    # benches that would measure identical engine code. The guard only
    # applies to push triggers; workflow_dispatch always runs.
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip bench]') }}
    runs-on:
      - self-hosted
      - gpu-private-systems
    timeout-minutes: 30

    env:
      # Dataset root path is provided via GH Actions repo variable
      # `BENCH_DATASET_ROOT` so the actual on-runner path is not
      # encoded in this public workflow. Set it under repo Settings →
      # Secrets and variables → Actions → Variables.
      DATASET_ROOT: ${{ vars.BENCH_DATASET_ROOT }}
      # Pin rayon worker count for ALL bench runs (build + any
      # parallel search path). The runner is i9-9900K with 16 logical
      # cores; without this cap rayon spawns 16 workers and:
      #   1. contaminates wall-clock numbers when CI shares the host,
      #   2. produces a different HNSW graph than competitors built on
      #      ann-benchmarks defaults (single-thread or 4-thread).
      # Cap at 4 so multi-thread competitors (qdrant, hnswlib with
      # `num_threads=4`) compare against the same parallelism budget;
      # single-thread competitors will need a dedicated 1-thread run
      # added when those benches land.
      RAYON_NUM_THREADS: "4"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        # The self-hosted runner doesn't preinstall Rust; this
        # action puts cargo / rustc on PATH for the rest of the job.
        # `stable` matches the workspace MSRV without pinning a
        # specific minor — fast updates land when stable refreshes.

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: bench-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            bench-${{ runner.os }}-cargo-

      - name: Build all bench binaries
        # Bench crates live in their own standalone workspaces so the
        # production Cargo.toml does not pull them in. Build each in
        # place; the artefact lands inside that subdirectory's target/.
        run: |
          cargo build --release --bin bench-vector-ann \
            --manifest-path benches/vector-ann/Cargo.toml
          mkdir -p target/release
          cp benches/vector-ann/target/release/bench-vector-ann target/release/bench-vector-ann

      # ── Vector (per-commit smoke; budget ≤ 20 min total) ──────
      #
      # Selection per commit:
      #   1. SIFT-128-L2 M=16  codec=none   — f32 regression detector.
      #   2. glove-100-ang M=16 codec=none   — real cosine f32 baseline.
      #   3. glove-100-ang M=16 codec=rabitq — RaBitQ popcount kernel
      #      side-by-side on the same dataset.
      #
      # glove dim=100 used to fail the RaBitQ multiple-of-64 guard. The
      # codec now rounds dim up to the next multiple of 64 internally
      # (encoder pads input vectors with zeros for the padded slots) so
      # any dim > 0 is supported. glove gives a REAL angular dataset
      # with meaningful nearest-neighbour structure — random Gaussian
      # synthetic data hits the concentration-of-measure trap (no
      # margin between top-K), making the QPS@recall comparison
      # uninformative.
      - name: Vector — per-commit smoke (SIFT + glove)
        id: vector
        if: ${{ contains(inputs.modalities || 'vector,graph,spatial,timeseries,search,document', 'vector') && inputs.high_d_dimensions == '' }}
        env:
          # If the workflow_dispatch input `thread_sweep` is set
          # (e.g. "1,4"), iterate the whole smoke set for each value
          # and tag the JSON output with the effective rayon thread
          # count. Empty / default = ST + MT4 sweep so each push
          # produces both single-thread and 4-thread numbers, which
          # is the minimum needed to compute parallel efficiency
          # E_core(4) = QPS_MT4 / (4 * QPS_ST) against competitors.
          THREAD_SWEEP: ${{ inputs.thread_sweep }}
          # Comma-separated n_shards values. Empty / "default" = single
          # shard (today's control path; the bench harness collapses to
          # a single HnswIndex when n_shards=1). Non-default opts the
          # outer loop into multi-shard cells; bench-data carries the
          # n_shards field on every JSON so the analysis can compute
          # E_node(K) = QPS(n_shards=K) / (K * QPS(n_shards=1)).
          SHARD_SWEEP: ${{ inputs.shard_sweep }}
          # Partitioning + routing for multi-shard cells. modulo =
          # scatter-all floor; centroid = k-means partitions + top-m
          # routed fan-out (the distributed design's IVF model).
          SHARD_ROUTING: ${{ inputs.shard_routing || 'modulo' }}
          ROUTE_TOP_M: ${{ inputs.route_top_m || '1' }}
          # First N base vectors per dataset (groundtruth recomputed
          # brute-force inside bench-vector-ann). 50k by default to
          # match the hnswlib competitor donor cells already published
          # on bench-data (glove-100-50k-angular t1/t4), so every push
          # produces apples-to-apples E_core and absolute QPS deltas
          # vs hnswlib without a separate manual cell. Manual runs can
          # bump to 100k+ for marketing-grade numbers.
          SUBSET_SIZE: ${{ inputs.subset_size || '50000' }}
          # Lean (push) vs full marketing matrix (manual). Push trigger
          # gives an empty string for boolean inputs, which we treat as
          # lean. Lean = sift+glove f32 only, no RaBitQ sweep.
          FULL_SWEEP: ${{ inputs.full_sweep && 'true' || 'false' }}
        run: |
          set -euo pipefail
          # ef sweep and subset are HARD-locked to keep each cell under
          # the 20-min job ceiling. full_sweep widens the cell SURFACE
          # (extra codec / mode rows) but never the per-cell workload.
          EF_SWEEP="40,80,200,400"
          echo "::notice::vector mode = $( [ "$FULL_SWEEP" = "true" ] && echo full-sweep || echo lean ), ef sweep = $EF_SWEEP, subset = $SUBSET_SIZE"

          # Build the list of `--threads` values to sweep. Empty input
          # defaults to "1 4" so per-commit numbers cover both the
          # ST baseline (matches hnswlib default) and the MT4 budget
          # (matches qdrant / hnswlib `set_num_threads(4)`). A non-
          # empty input is parsed as a comma list.
          if [ -z "${THREAD_SWEEP// /}" ] || [ "$THREAD_SWEEP" = "default" ]; then
            THREAD_LIST="1 4"
          else
            THREAD_LIST="$(echo "$THREAD_SWEEP" | tr ',' ' ')"
          fi
          echo "::notice::vector thread sweep = ${THREAD_LIST}"

          # Build the list of `--n-shards` values to sweep. Empty / default
          # collapses to "1" (single-index control path, bit-identical to
          # legacy harness). Multi-shard cells are opt-in via the
          # workflow_dispatch input so the per-commit lean budget is
          # unaffected.
          if [ -z "${SHARD_SWEEP// /}" ] || [ "$SHARD_SWEEP" = "default" ]; then
            SHARD_LIST="1"
          else
            SHARD_LIST="$(echo "$SHARD_SWEEP" | tr ',' ' ')"
          fi
          echo "::notice::vector shard sweep = ${SHARD_LIST}"

          # SIFT (L2 regression detector)
          DS_DIR="$DATASET_ROOT/sift"
          for f in sift_base.fvecs sift_query.fvecs sift_groundtruth.ivecs; do
            test -f "$DS_DIR/$f" || { echo "::error::missing $DS_DIR/$f"; exit 1; }
          done

          # glove (cosine f32 + RaBitQ)
          GLOVE_DIR="$DATASET_ROOT/glove-100-angular"
          for f in glove_base.fvecs glove_query.fvecs glove_groundtruth.ivecs; do
            test -f "$GLOVE_DIR/$f" || { echo "::error::missing $GLOVE_DIR/$f"; exit 1; }
          done

          for T in $THREAD_LIST; do
           for S in $SHARD_LIST; do
            # Rayon pool budget = T x S. `--threads` pins the GLOBAL rayon
            # pool, which the shard scatter's par_iter also runs on; with
            # the pool capped at T the (T=2, S=2) cell would execute its
            # 4 concurrent shard searches on only 2 workers and report a
            # meaningless fixed-budget efficiency (measured 0.20-0.25 at
            # 12d214b before this fix). Semantics after the fix:
            #   T = per-shard search-thread budget
            #   T x S = total core budget for the cell
            # S=1 collapses to POOL=T, bit-identical to the legacy shape.
            POOL=$((T * S))
            echo "::group::SIFT-128-L2 M=16 codec=none threads=$T shards=$S pool=$POOL"
            ./target/release/bench-vector-ann \
              --train       "$DS_DIR/sift_base.fvecs" \
              --query       "$DS_DIR/sift_query.fvecs" \
              --groundtruth "$DS_DIR/sift_groundtruth.ivecs" \
              --dataset-name sift-128-euclidean \
              --m 16 --ef-construction 200 \
              --codec none --ef-sweep "$EF_SWEEP" \
              --threads "$POOL" \
              --search-threads "$T" \
              --n-shards "$S" \
              --shard-routing "$SHARD_ROUTING" --route-top-m "$ROUTE_TOP_M" \
              --subset-size "$SUBSET_SIZE" \
              --output bench-results
            echo "::endgroup::"

            # SIFT M=24 probe: regression detector for M-scaling. A
            # previous bug had the engine getting SLOWER as M grew
            # past 16 (sift M16 4064 vs M24 3676 vs M32 3434 QPS) and
            # the lean push needs to catch that drift on every commit.
            # One extra cell per thread config (~30s ST, ~10s MT4) at
            # 50k subset, fits inside the 20-min budget with room.
            echo "::group::SIFT-128-L2 M=24 codec=none threads=$T shards=$S"
            ./target/release/bench-vector-ann \
              --train       "$DS_DIR/sift_base.fvecs" \
              --query       "$DS_DIR/sift_query.fvecs" \
              --groundtruth "$DS_DIR/sift_groundtruth.ivecs" \
              --dataset-name sift-128-euclidean \
              --m 24 --ef-construction 200 \
              --codec none --ef-sweep "$EF_SWEEP" \
              --threads "$POOL" \
              --search-threads "$T" \
              --n-shards "$S" \
              --shard-routing "$SHARD_ROUTING" --route-top-m "$ROUTE_TOP_M" \
              --subset-size "$SUBSET_SIZE" \
              --output bench-results
            echo "::endgroup::"

            # RaBitQ diagnostic on SIFT-128 (manual only — padding path
            # not exercised here; only kept for full marketing matrix).
            if [ "$FULL_SWEEP" = "true" ]; then
              echo "::group::SIFT-128-L2 M=16 quantization=rabitq threads=$T shards=$S"
              ./target/release/bench-vector-ann \
                --train       "$DS_DIR/sift_base.fvecs" \
                --query       "$DS_DIR/sift_query.fvecs" \
                --groundtruth "$DS_DIR/sift_groundtruth.ivecs" \
                --dataset-name sift-128-euclidean \
                --m 16 --ef-construction 200 \
                --codec none --quantization rabitq \
                --ef-sweep "$EF_SWEEP" \
                --threads "$POOL" \
                --search-threads "$T" \
                --n-shards "$S" \
                --shard-routing "$SHARD_ROUTING" --route-top-m "$ROUTE_TOP_M" \
                --subset-size "$SUBSET_SIZE" \
                --output bench-results
              echo "::endgroup::"
            fi

            # Push gate: glove f32 only. RaBitQ pipeline lives behind
            # FULL_SWEEP so the push job stays inside the 20-min budget.
            if [ "$FULL_SWEEP" = "true" ]; then
              QUANT_LIST="none rabitq"
            else
              QUANT_LIST="none"
            fi
            for QUANT in $QUANT_LIST; do
              echo "::group::glove-100-angular M=16 codec=$QUANT threads=$T shards=$S"
              ./target/release/bench-vector-ann \
                --train       "$GLOVE_DIR/glove_base.fvecs" \
                --query       "$GLOVE_DIR/glove_query.fvecs" \
                --groundtruth "$GLOVE_DIR/glove_groundtruth.ivecs" \
                --dataset-name glove-100-angular \
                --m 16 --ef-construction 200 \
                --codec none --quantization "$QUANT" \
                --ef-sweep "$EF_SWEEP" \
                --threads "$POOL" \
                --search-threads "$T" \
                --n-shards "$S" \
                --shard-routing "$SHARD_ROUTING" --route-top-m "$ROUTE_TOP_M" \
                --subset-size "$SUBSET_SIZE" \
                --output bench-results
              echo "::endgroup::"
            done

            # Exact recall=1.0 baseline cells live behind FULL_SWEEP.
            # Initial attempt to run them on every push pushed the lean
            # job past the 20-min wall, so they migrate to the manual
            # full-matrix workflow instead. The `--search-mode exact`
            # CLI flag stays available for ad-hoc runs.
            if [ "$FULL_SWEEP" = "true" ]; then
              for DSET in "sift-128-euclidean:$DS_DIR/sift" "glove-100-angular:$GLOVE_DIR/glove"; do
                DSNAME="${DSET%%:*}"
                DSPATH="${DSET##*:}"
                echo "::group::$DSNAME M=16 search-mode=exact threads=$T shards=$S"
                ./target/release/bench-vector-ann \
                  --train       "${DSPATH}_base.fvecs" \
                  --query       "${DSPATH}_query.fvecs" \
                  --groundtruth "${DSPATH}_groundtruth.ivecs" \
                  --dataset-name "$DSNAME" \
                  --m 16 --ef-construction 200 \
                  --codec none --search-mode exact \
                  --threads "$POOL" \
                  --search-threads "$T" \
                  --n-shards "$S" \
                  --shard-routing "$SHARD_ROUTING" --route-top-m "$ROUTE_TOP_M" \
                  --subset-size "$SUBSET_SIZE" \
                  --output bench-results
                echo "::endgroup::"
              done
            fi

            # Gap #2 (E+C) RerankMode + oversample sweep on glove RaBitQ.
            # Manual-only: this matrix is for marketing recall/QPS curves,
            # not regression detection, so it's gated behind FULL_SWEEP.
            if [ "$FULL_SWEEP" != "true" ]; then
              continue
            fi
            # The previous CI bench accumulated 7 RaBitQ sweeps over time
            # and started exceeding the GitHub Actions 5h timeout (d67fc2d
            # cancelled at 3h, c953a05 cancelled at 5h6m). Trimmed to the
            # 3 oversample rows that ACTUALLY produce new data after
            # baselines were captured in 5248f69:
            #   - end-of-search oversample=2.0   ← qdrant-parity row (peak r≈0.945)
            #   - end-of-search oversample=2.5   ← sweet-spot probe between 2.0/3.0
            #   - end-of-search oversample=3.0   ← recall headroom (r≈0.965)
            # 0adfc54 confirmed os=2.0 lands at recall 0.945 (just under
            # the ≥0.95 cutoff) and os=3.0 lands at 0.965 with QPS 162.
            # qdrant ref @ ≥0.95 is 246 QPS — os=2.5 might cross 0.95
            # while keeping QPS materially above the os=3.0 floor.
            # The α=1.0 inline baseline, α=1.2 inline, end-of-search
            # oversample=1.0 default, and `none` recall-ceiling rows are
            # already in bench-data under 5248f69 / b1004cd / 45b87bf —
            # do NOT re-run them in CI on every push. Bring them back if
            # the recall surface drifts. Total budget: 3 RaBitQ rows ×
            # ~25min + f32 row + α=1.0 baseline = ~2h30m, well under
            # the 5h GitHub Actions ceiling.
            for OS in 2.0 2.5 3.0; do
              echo "::group::glove-100-angular M=16 quantization=rabitq rerank_mode=end-of-search oversample=$OS threads=$T shards=$S"
              ./target/release/bench-vector-ann \
                --train       "$GLOVE_DIR/glove_base.fvecs" \
                --query       "$GLOVE_DIR/glove_query.fvecs" \
                --groundtruth "$GLOVE_DIR/glove_groundtruth.ivecs" \
                --dataset-name glove-100-angular \
                --m 16 --ef-construction 200 \
                --codec none --quantization rabitq \
                --rerank-mode end-of-search --rerank-oversample "$OS" \
                --ef-sweep "$EF_SWEEP" \
                --threads "$POOL" \
                --search-threads "$T" \
                --n-shards "$S" \
                --shard-routing "$SHARD_ROUTING" --route-top-m "$ROUTE_TOP_M" \
                --subset-size "$SUBSET_SIZE" \
                --output bench-results
              echo "::endgroup::"
            done
           done
          done

      # ── High-D probe: gist-960-euclidean (manual opt-in) ─────
      #
      # Higher dimensions stress the distance kernel SIMD width and the
      # graph walk's cache footprint, which is where MT4 efficiency
      # tends to fall first. Off by default; enable with the
      # `high_d_probe` workflow input. Missing dataset = warning, not
      # a failure — the runner box decides what's stored.
      - name: Vector high-D probe — gist-960-euclidean
        if: ${{ inputs.high_d_probe }}
        env:
          THREAD_SWEEP: ${{ inputs.thread_sweep }}
          SUBSET_SIZE: ${{ inputs.subset_size || '20000' }}
        run: |
          set -euo pipefail
          GIST_DIR="$DATASET_ROOT/gist-960-euclidean"
          if [ ! -d "$GIST_DIR" ]; then
            echo "::warning::gist-960-euclidean dataset not found at $GIST_DIR — skip"
            exit 0
          fi
          for f in gist_base.fvecs gist_query.fvecs gist_groundtruth.ivecs; do
            test -f "$GIST_DIR/$f" || { echo "::warning::missing $GIST_DIR/$f — skip"; exit 0; }
          done
          if [ -z "${THREAD_SWEEP// /}" ] || [ "$THREAD_SWEEP" = "default" ]; then
            THREAD_LIST="1 4"
          else
            THREAD_LIST="$(echo "$THREAD_SWEEP" | tr ',' ' ')"
          fi
          for T in $THREAD_LIST; do
            echo "::group::gist-960-euclidean M=16 codec=none threads=$T"
            ./target/release/bench-vector-ann \
              --train       "$GIST_DIR/gist_base.fvecs" \
              --query       "$GIST_DIR/gist_query.fvecs" \
              --groundtruth "$GIST_DIR/gist_groundtruth.ivecs" \
              --dataset-name gist-960-euclidean \
              --m 16 --ef-construction 200 \
              --codec none --ef-sweep "40,80,200,400,800" \
              --threads "$T" --search-threads "$T" \
              --subset-size "$SUBSET_SIZE" \
              --output bench-results
            echo "::endgroup::"
          done

      # ── Modern embedding-dim tiers (1536 / 3072 / 4096 / 8192) ─
      #
      # Each dimension corresponds to a current production embedding
      # model class: text-embedding-3-small (1536), text-embedding-3-large
      # (3072), NV-Embed-v2 (4096), Stella en 1.5B v5 (8192). Datasets
      # are prepared on the runner via fetch_high_d.sh; missing tier is
      # a warning, not a failure, so the workflow remains tolerant of a
      # partially-provisioned host. Dataset name in the JSON carries the
      # dimension so the dashboard splits cells cleanly.
      - name: Vector high-D dimension tiers
        if: ${{ inputs.high_d_dimensions != '' }}
        env:
          THREAD_SWEEP: ${{ inputs.thread_sweep }}
          DIMENSIONS: ${{ inputs.high_d_dimensions }}
        run: |
          set -euo pipefail
          if [ -z "${THREAD_SWEEP// /}" ] || [ "$THREAD_SWEEP" = "default" ]; then
            THREAD_LIST="1 4"
          else
            THREAD_LIST="$(echo "$THREAD_SWEEP" | tr ',' ' ')"
          fi
          for D in $(echo "$DIMENSIONS" | tr ',' ' '); do
            TIER_DIR="$DATASET_ROOT/high-d/$D"
            if [ ! -d "$TIER_DIR" ]; then
              echo "::warning::high-d tier $D not provisioned at $TIER_DIR — skip (run fetch_high_d.sh $D on the runner)"
              continue
            fi
            BASE=$(ls "$TIER_DIR"/*_base.fvecs 2>/dev/null | head -1 || true)
            QUERY=$(ls "$TIER_DIR"/*_query.fvecs 2>/dev/null | head -1 || true)
            TRUTH=$(ls "$TIER_DIR"/*_groundtruth.ivecs 2>/dev/null | head -1 || true)
            if [ -z "$BASE" ] || [ -z "$QUERY" ] || [ -z "$TRUTH" ]; then
              echo "::warning::tier $D missing one of base/query/groundtruth in $TIER_DIR — skip"
              continue
            fi
            DSNAME="high-d-${D}-angular"
            for T in $THREAD_LIST; do
              echo "::group::$DSNAME M=16 codec=none threads=$T"
              ./target/release/bench-vector-ann \
                --train       "$BASE" \
                --query       "$QUERY" \
                --groundtruth "$TRUTH" \
                --dataset-name "$DSNAME" \
                --m 16 --ef-construction 200 \
                --codec none --ef-sweep "80,200,400,800,1600" \
                --threads "$T" --search-threads "$T" \
                --subset-size 20000 \
                --output bench-results
              echo "::endgroup::"
              # Quantization sweep skipped on dim > 4096 — RaBitQ/SQ8 build +
              # search at 8192-dim with 5-point ef sweep doesn't fit a single
              # cell into the 30-min job timeout. Re-enable per-dim later if
              # we widen the budget or shrink the ef sweep.
              if [ "$D" -gt 4096 ]; then continue; fi
              for QUANT in rabitq sq8; do
                echo "::group::$DSNAME M=16 quantization=$QUANT threads=$T"
                ./target/release/bench-vector-ann \
                  --train       "$BASE" \
                  --query       "$QUERY" \
                  --groundtruth "$TRUTH" \
                  --dataset-name "$DSNAME" \
                  --m 16 --ef-construction 200 \
                  --codec none --quantization "$QUANT" \
                  --ef-sweep "80,200,400,800,1600" \
                  --threads "$T" --search-threads "$T" \
                  --subset-size 20000 \
                  --output bench-results
                echo "::endgroup::"
              done
            done
          done

      # ── Future modality steps land here, one per modality ─────
      # - name: Graph — LDBC SNB SF1 Interactive
      #   if: ${{ contains(inputs.modalities || '...', 'graph') }}
      #   run: ./target/release/bench-graph-ldbc ...
      #
      # - name: Spatial — PostGIS-shape workloads
      #   ...
      #
      # - name: Time-series — TSBS DevOps 100-host
      #   ...
      #
      # - name: Search — Search Benchmark Game
      #   ...
      #
      # - name: Document — YCSB A/C
      #   ...

      - name: Push results to bench-data branch
        # Bench JSONs land on a dedicated orphan branch (`bench-data`)
        # — NOT on `main`. `main` is branch-protected; auto-bot commits
        # are forbidden. The docs workflow pulls bench-data on every
        # run via `git checkout bench-data -- bench-results/`. This
        # decouples the heavyweight bench data history from the source
        # tree on main.
        #
        # bench-data is an orphan branch: each push replaces the entire
        # tree, so history never compounds (we keep a few generations
        # via the GH workflow artifact upload step for forensic
        # reproducibility, not in git).
        run: |
          set -euo pipefail
          NEW_FILES=$(git status --porcelain bench-results/ | awk '{print $2}')
          if [ -z "$NEW_FILES" ]; then
            echo "no new bench-results files produced — skipping push"
            exit 0
          fi

          # Snapshot the new files outside the working tree.
          SNAPSHOT=$(mktemp -d)
          # If bench-data already exists, pull its current contents first
          # so we APPEND rather than replace.
          if git ls-remote --exit-code --heads origin bench-data > /dev/null 2>&1; then
            git fetch origin bench-data:bench-data
            git -C "$GITHUB_WORKSPACE" archive bench-data -- bench-results/ 2>/dev/null \
              | tar -x -C "$SNAPSHOT" 2>/dev/null \
              || echo "::notice::bench-data archive empty — starting fresh"
          fi
          # Overlay the new files on top of the snapshot.
          cp -R bench-results/. "$SNAPSHOT/bench-results/" 2>/dev/null || true

          git config user.name  "coordinode-bench-bot"
          git config user.email "bench-bot@users.noreply.github.com"

          # If the fetch above created a local bench-data branch, drop it
          # — otherwise `git checkout --orphan bench-data` fails with
          # "a branch named 'bench-data' already exists".
          git branch -D bench-data 2>/dev/null || true

          # Recreate bench-data as a fresh orphan branch each run.
          git checkout --orphan bench-data
          git rm -rf . 2>/dev/null || true
          # Copy snapshot back into the working tree.
          mkdir -p bench-results
          cp -R "$SNAPSHOT/bench-results/." bench-results/
          git add bench-results/
          git commit \
            -m "chore(bench): results @ ${{ github.sha }}" \
            -m "Modalities: $(find bench-results -mindepth 1 -maxdepth 1 -type d | xargs -I{} basename {} | sort -u | xargs)" \
            -m "Auto-committed by .github/workflows/bench.yml (runner: gpu-private-systems)"
          # Force-push the orphan branch — overwrites history every run,
          # which is the intended pattern for this branch.
          git push origin bench-data --force

      - name: Upload workflow artifact (90-day retention)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-${{ github.sha }}
          path: bench-results/**/*.json
          retention-days: 90
          if-no-files-found: warn
