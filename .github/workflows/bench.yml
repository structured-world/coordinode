# Benchmark suite — all modalities, sequential, single self-hosted runner.
#
# CoordiNode benches ONE host at a time (<bench-runner> —
# org runner label `gpu-private-systems`). Splitting per modality
# into separate workflows is pointless: they share the box, the
# datasets directory, the CPU cores, and the build cache. Running
# them in one job means:
#
# - One `cargo build --release` for the whole workspace, reused
#   across every modality step
# - Sequential order — no contention for CPU/IO
# - Single commit at the end with the full batch of new JSONs
# - One concurrency lock — no two bench batches race
#
# Triggered ONLY by push to main. Competitor benches are NOT in
# this workflow — they run manually on the same runner per release
# (see benches/vector-ann/README.md).

name: bench

on:
  push:
    branches: [main]
    paths:
      # Any modality engine code, the shared harness, or any bench
      # binary triggers a full re-bench. Result-only commits don't
      # match (bench-results/ deliberately excluded).
      - 'crates/coordinode-core/**'
      - 'crates/coordinode-storage/**'
      - 'crates/coordinode-modality/**'
      - 'crates/coordinode-vector/**'
      - 'crates/coordinode-search/**'
      - 'crates/coordinode-query/**'
      - 'crates/coordinode-bench/**'
      - 'benches/*/src/**'
      - 'benches/*/Cargo.toml'
      - '.github/workflows/bench.yml'
  workflow_dispatch:
    inputs:
      modalities:
        description: 'Comma-separated modality names to run (default: all known). E.g. "vector" to re-bench only vector.'
        required: false
        default: 'vector'

concurrency:
  group: bench
  cancel-in-progress: false  # bench runs are minutes-to-hours; never abort an in-flight batch

permissions:
  contents: write  # post-bench JSON commit to bench-results/

jobs:
  bench:
    name: All modalities (sequential)
    runs-on:
      - self-hosted
      - gpu-private-systems
    timeout-minutes: 180

    env:
      # Dataset root path is provided via GH Actions repo variable
      # `BENCH_DATASET_ROOT` so the actual on-runner path is not
      # encoded in this public workflow. Set it under repo Settings →
      # Secrets and variables → Actions → Variables.
      DATASET_ROOT: ${{ vars.BENCH_DATASET_ROOT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        # The self-hosted runner doesn't preinstall Rust; this
        # action puts cargo / rustc on PATH for the rest of the job.
        # `stable` matches the workspace MSRV without pinning a
        # specific minor — fast updates land when stable refreshes.

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: bench-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            bench-${{ runner.os }}-cargo-

      - name: Build all bench binaries
        run: cargo build --release --bins -p coordinode-bench-vector-ann
        # As we add graph / spatial / ts / search / doc bench
        # binaries to the workspace, append `-p <name>` here. One
        # cargo invocation = one shared compile graph = fastest.

      # ── Vector (per-commit smoke; budget ≤ 20 min total) ──────
      #
      # Selection per commit:
      #   1. SIFT-128-L2 M=16    codec=none   — f32 regression detector.
      #   2. random-128-ang M=16 codec=none   — cosine f32 baseline.
      #   3. random-128-ang M=16 codec=rabitq — RaBitQ popcount kernel
      #      side-by-side on the same dataset.
      #
      # Why random-128-angular over glove-100-angular: RaBitQ requires
      # dim divisible by 64 (popcount kernel operates on u64 words).
      # glove dim=100 fails that check → calibration silently skipped
      # → RaBitQ run was measuring f32 (validated empirically on
      # 2281ba0: codec=none and codec=rabitq returned identical QPS
      # at every ef on glove M=16). random-128-angular at dim=128 is
      # a multiple of 64 so the codec actually activates.
      #
      # Synthetic angular dataset: 200K unit vectors × dim=128, GT
      # computed offline by prep_datasets.py against the full base
      # (10K queries × top-100). dim=128 also matches the
      # production-relevant text-embedding lower bound and pairs
      # naturally with the SIFT-128 regression detector.
      - name: Vector — per-commit smoke (SIFT + random-128-ang)
        id: vector
        if: ${{ contains(inputs.modalities || 'vector,graph,spatial,timeseries,search,document', 'vector') }}
        run: |
          set -euo pipefail
          EF_SWEEP="20,40,80,200,400,800"

          # SIFT (L2 regression detector)
          DS_DIR="$DATASET_ROOT/sift"
          for f in sift_base.fvecs sift_query.fvecs sift_groundtruth.ivecs; do
            test -f "$DS_DIR/$f" || { echo "::error::missing $DS_DIR/$f"; exit 1; }
          done
          echo "::group::SIFT-128-L2 M=16 codec=none"
          ./target/release/bench-vector-ann \
            --train       "$DS_DIR/sift_base.fvecs" \
            --query       "$DS_DIR/sift_query.fvecs" \
            --groundtruth "$DS_DIR/sift_groundtruth.ivecs" \
            --dataset-name sift-128-euclidean \
            --m 16 --ef-construction 200 \
            --codec none --ef-sweep "$EF_SWEEP" \
            --output bench-results
          echo "::endgroup::"

          # random-128-angular cosine: f32 + RaBitQ side-by-side
          R128_DIR="$DATASET_ROOT/random-128-angular"
          for f in random_base.fvecs random_query.fvecs random_groundtruth.ivecs; do
            test -f "$R128_DIR/$f" || { echo "::error::missing $R128_DIR/$f"; exit 1; }
          done
          for QUANT in none rabitq; do
            echo "::group::random-128-angular M=16 codec=$QUANT"
            ./target/release/bench-vector-ann \
              --train       "$R128_DIR/random_base.fvecs" \
              --query       "$R128_DIR/random_query.fvecs" \
              --groundtruth "$R128_DIR/random_groundtruth.ivecs" \
              --dataset-name random-128-angular \
              --m 16 --ef-construction 200 \
              --codec none --quantization "$QUANT" \
              --ef-sweep "$EF_SWEEP" \
              --output bench-results
            echo "::endgroup::"
          done

      # ── Future modality steps land here, one per modality ─────
      # - name: Graph — LDBC SNB SF1 Interactive
      #   if: ${{ contains(inputs.modalities || '...', 'graph') }}
      #   run: ./target/release/bench-graph-ldbc ...
      #
      # - name: Spatial — PostGIS-shape workloads
      #   ...
      #
      # - name: Time-series — TSBS DevOps 100-host
      #   ...
      #
      # - name: Search — Search Benchmark Game
      #   ...
      #
      # - name: Document — YCSB A/C
      #   ...

      - name: Push results to bench-data branch
        # Bench JSONs land on a dedicated orphan branch (`bench-data`)
        # — NOT on `main`. `main` is branch-protected; auto-bot commits
        # are forbidden. The docs workflow pulls bench-data on every
        # run via `git checkout bench-data -- bench-results/`. This
        # decouples the heavyweight bench data history from the source
        # tree on main.
        #
        # bench-data is an orphan branch: each push replaces the entire
        # tree, so history never compounds (we keep a few generations
        # via the GH workflow artifact upload step for forensic
        # reproducibility, not in git).
        run: |
          set -euo pipefail
          NEW_FILES=$(git status --porcelain bench-results/ | awk '{print $2}')
          if [ -z "$NEW_FILES" ]; then
            echo "no new bench-results files produced — skipping push"
            exit 0
          fi

          # Snapshot the new files outside the working tree.
          SNAPSHOT=$(mktemp -d)
          # If bench-data already exists, pull its current contents first
          # so we APPEND rather than replace.
          if git ls-remote --exit-code --heads origin bench-data > /dev/null 2>&1; then
            git fetch origin bench-data:bench-data
            git -C "$GITHUB_WORKSPACE" archive bench-data -- bench-results/ 2>/dev/null \
              | tar -x -C "$SNAPSHOT" 2>/dev/null \
              || echo "::notice::bench-data archive empty — starting fresh"
          fi
          # Overlay the new files on top of the snapshot.
          cp -R bench-results/. "$SNAPSHOT/bench-results/" 2>/dev/null || true

          git config user.name  "coordinode-bench-bot"
          git config user.email "bench-bot@users.noreply.github.com"

          # If the fetch above created a local bench-data branch, drop it
          # — otherwise `git checkout --orphan bench-data` fails with
          # "a branch named 'bench-data' already exists".
          git branch -D bench-data 2>/dev/null || true

          # Recreate bench-data as a fresh orphan branch each run.
          git checkout --orphan bench-data
          git rm -rf . 2>/dev/null || true
          # Copy snapshot back into the working tree.
          mkdir -p bench-results
          cp -R "$SNAPSHOT/bench-results/." bench-results/
          git add bench-results/
          git commit \
            -m "chore(bench): results @ ${{ github.sha }}" \
            -m "Modalities: $(find bench-results -mindepth 1 -maxdepth 1 -type d | xargs -I{} basename {} | sort -u | xargs)" \
            -m "Auto-committed by .github/workflows/bench.yml (runner: gpu-private-systems)"
          # Force-push the orphan branch — overwrites history every run,
          # which is the intended pattern for this branch.
          git push origin bench-data --force

      - name: Upload workflow artifact (90-day retention)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-${{ github.sha }}
          path: bench-results/**/*.json
          retention-days: 90
          if-no-files-found: warn
