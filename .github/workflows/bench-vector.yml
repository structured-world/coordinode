# Vector ANN benchmark — CoordiNode side only.
#
# Runs ONLY on push to main (no PR / no every-commit-on-branches).
# Competitor benches (hnswlib / faiss / mongodb-vector / etc.) are
# NOT triggered here — they run manually on the same runner once
# per release; see benches/vector-ann/README.md.
#
# The job runs on the org-level self-hosted runner labelled
# `gpu-private-systems` (id 2473) at gpu.private.systems
# (192.168.1.200). The runner has SIFT1M permanently placed at
# /srv/coordinode-bench/datasets/sift/ — re-runs reuse the on-disk
# files; no per-run download.
#
# After the bench finishes, the new JSON is committed back to main
# in `bench-results/vector/<dataset>/<sha>-coordinode-<ts>.json`
# with `[skip ci]` so the commit does NOT re-trigger this workflow.

name: bench-vector

on:
  # Run only on direct pushes to main (merged PRs included since
  # GitHub records the merge as a push). PRs themselves do NOT
  # trigger this workflow — there's no `pull_request` event here.
  push:
    branches: [main]
    paths:
      # Re-bench when the vector engine, harness, or bench binary
      # changes. Documentation-only edits to bench READMEs don't
      # trigger; result JSON commits don't trigger either (else
      # the workflow would recurse).
      - 'crates/coordinode-vector/**'
      - 'crates/coordinode-bench/**'
      - 'benches/vector-ann/src/**'
      - 'benches/vector-ann/Cargo.toml'
      - '.github/workflows/bench-vector.yml'
  # Manual override — useful for re-running on the same SHA, e.g.
  # after a runner-side dataset update.
  workflow_dispatch:
    inputs:
      dataset:
        description: 'Dataset name suffix (sift-128-euclidean by default)'
        required: false
        default: 'sift-128-euclidean'

# Skip if a bench-only commit triggered the workflow (defensive —
# the path filter above already excludes bench-results/, but the
# guard catches edge cases like a single commit touching both vector
# code AND bench-results in the same push).
concurrency:
  group: bench-vector
  cancel-in-progress: false  # benches are expensive; never abort an in-flight run

permissions:
  contents: write  # needs to commit back to bench-results/

jobs:
  bench:
    name: SIFT1M sweep (CN)
    runs-on:
      - self-hosted
      - gpu-private-systems
    timeout-minutes: 60

    env:
      DATASET_NAME: ${{ inputs.dataset || 'sift-128-euclidean' }}
      DATASET_ROOT: /srv/coordinode-bench/datasets

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so the bench harness's git fingerprint
          # captures the right commit date (NOT the shallow-clone
          # truncated history).
          fetch-depth: 0
          # Use a token that can push back to main with the
          # bench-results commit. GH workflow default token has
          # `contents: write` per the `permissions:` block above.
          persist-credentials: true

      - name: Identify dataset paths
        id: ds
        run: |
          set -euo pipefail
          DS_DIR="$DATASET_ROOT/sift"
          for f in sift_base.fvecs sift_query.fvecs sift_groundtruth.ivecs; do
            test -f "$DS_DIR/$f" || { echo "missing $DS_DIR/$f — see benches/vector-ann/README.md for one-time placement"; exit 1; }
          done
          echo "train=$DS_DIR/sift_base.fvecs"        >> "$GITHUB_OUTPUT"
          echo "query=$DS_DIR/sift_query.fvecs"       >> "$GITHUB_OUTPUT"
          echo "groundtruth=$DS_DIR/sift_groundtruth.ivecs" >> "$GITHUB_OUTPUT"

      - name: Cargo build (release)
        run: cargo build --release -p coordinode-bench-vector-ann

      - name: Run bench
        run: |
          set -euo pipefail
          ./target/release/bench-vector-ann \
            --train       "${{ steps.ds.outputs.train }}" \
            --query       "${{ steps.ds.outputs.query }}" \
            --groundtruth "${{ steps.ds.outputs.groundtruth }}" \
            --dataset-name "$DATASET_NAME" \
            --m 32 \
            --ef-construction 200 \
            --codec none \
            --output bench-results

      - name: Commit JSON to bench-results/
        run: |
          set -euo pipefail
          # The bench just wrote exactly one new JSON file; capture
          # it (in case the workflow runs multiple times on the same
          # SHA, the timestamp suffix keeps them distinct).
          NEW_FILES=$(git -C "$GITHUB_WORKSPACE" status --porcelain bench-results/ | awk '{print $2}')
          if [ -z "$NEW_FILES" ]; then
            echo "no new bench-results files produced — skipping commit"
            exit 0
          fi
          git config user.name  "coordinode-bench-bot"
          git config user.email "bench-bot@users.noreply.github.com"
          git add bench-results/
          # `[skip ci]` in the commit message prevents the workflow
          # from recursing — even though paths-ignore already
          # excludes bench-results/, this is belt-and-suspenders
          # and matches the broader GH Actions convention.
          git commit -m "chore(bench): SIFT1M results @ ${{ github.sha }} [skip ci]" \
                     -m "Auto-committed by .github/workflows/bench-vector.yml (runner: gpu-private-systems)"
          git push origin HEAD:main

      - name: Upload artifact (also kept as workflow artefact for 90 days)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-vector-${{ github.sha }}
          path: bench-results/vector/${{ env.DATASET_NAME }}/*.json
          retention-days: 90
