[workspace]
# No crates.io publishing — coordinode is a server binary, not a library.
# Releases produce musl binaries + Docker image pushed to ghcr.io.
semver_check = false
git_only = true
publish = false
git_release_enable = true
changelog_update = true
git_tag_name = "v{{ version }}"

[changelog]
commit_parsers = [
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^style", skip = true },
    { message = "^build", skip = true },
    { message = "^docs\\(ci\\)", skip = true },
    { message = "^docs\\(copilot\\)", skip = true },
    { message = "^Merge", skip = true },
    { message = "^docs", group = "Documentation" },
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactored" },
    { message = "^test", group = "Testing" },
]

# Library crates are internal implementation details — not released individually.
# All crates share the workspace version via version.workspace = true.
# release-plz tracks only coordinode-server (the shipped binary) for version
# bumping; it updates [workspace.package].version which cascades to all crates.
# This prevents cargo package from being run on library crates whose internal
# interdependencies are not published to crates.io.

[[package]]
name = "coordinode-core"
release = false

[[package]]
name = "coordinode-query"
release = false

[[package]]
name = "coordinode-vector"
release = false

[[package]]
name = "coordinode-search"
release = false

[[package]]
name = "coordinode-storage"
release = false

[[package]]
name = "coordinode-raft"
release = false

[[package]]
name = "coordinode-auth"
release = false

[[package]]
name = "coordinode-s3"
release = false

[[package]]
name = "coordinode-embed"
release = false
