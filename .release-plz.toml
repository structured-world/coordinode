[workspace]
# No crates.io publishing — coordinode is a server binary, not a library.
# Releases produce musl binaries + Docker image pushed to ghcr.io.
#
# Because every crate has `publish = false`, our forked release-plz
# auto-disables cascade version bumps for them (see release-plz/release-plz#2799).
# Only crates with direct conventional commits since the last tag appear in
# the release PR — so a change touching only `crates/coordinode-query/` no
# longer drags every transitive dependent into the PR with a fake bump.
semver_check = false
git_only = true
publish = false
# Per-crate CHANGELOG.md is enabled: each crate under crates/ gets its own
# CHANGELOG.md updated by release-plz. A workspace-wide CHANGELOG.md is
# additionally generated by git-cliff in the release workflow.
git_tag_enable = false
git_release_enable = false
git_tag_name = "v{{ version }}"
# All crate changes are aggregated into a single CHANGELOG.md at the repo root.
# Each crate gets its own subsection grouped under the version header.
workspace_changelog = "CHANGELOG.md"

[changelog]
commit_parsers = [
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^style", skip = true },
    { message = "^build", skip = true },
    { message = "^docs\\(ci\\)", skip = true },
    { message = "^docs\\(copilot\\)", skip = true },
    { message = "^Merge", skip = true },
    { message = "^Revert", skip = true },
    { message = "^docs", group = "Documentation" },
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactored" },
    { message = "^test", group = "Testing" },
]

# The shipped binary — only this crate gets a git tag and GitHub Release.
# CHANGELOG.md is generated here (per-crate) AND by git-cliff at workspace level.
[[package]]
name = "coordinode-server"
git_tag_enable = true
git_release_enable = true

# Library crate — release-plz tracks changelog but does not create releases.
# Changelog is derived from workspace CHANGELOG.md via scripts/split-changelog.py.
#
# git_tag_name must be package-specific so the workspace tag `v0.3.9` (owned by
# coordinode-server) does NOT match this crate's release regex.  Without a unique
# tag pattern, release-plz would find v0.3.9 as coordinode-client's baseline,
# check out that commit, and fail with "package not found" because coordinode-client
# did not exist in the workspace at that tag.
[[package]]
name = "coordinode-client"
release = false
git_tag_name = "coordinode-client-v{{ version }}"

# Test-only crate — not a releasable package. Excluded from release-plz
# processing to avoid "package not found in workspace" errors: release-plz
# checks out an old baseline tag where this crate did not yet exist.
[[package]]
name = "coordinode-integration"
release = false
git_tag_name = "coordinode-integration-v{{ version }}"

# Library crates added after the v0.3.x line — same treatment as
# coordinode-client (release=false, unique git_tag_name so release-plz
# does not adopt the workspace tag as their baseline and fail to find
# them in the old worktree).

[[package]]
name = "coordinode-auth"
release = false
git_tag_name = "coordinode-auth-v{{ version }}"

[[package]]
name = "coordinode-bench"
release = false
git_tag_name = "coordinode-bench-v{{ version }}"

[[package]]
name = "coordinode-cluster"
