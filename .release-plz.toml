[workspace]
# No crates.io publishing — coordinode is a server binary, not a library.
# Releases produce musl binaries + Docker image pushed to ghcr.io.
#
# Because every crate has `publish = false`, our forked release-plz
# auto-disables cascade version bumps for them (see release-plz/release-plz#2799).
# Only crates with direct conventional commits since the last tag appear in
# the release PR — so a change touching only `crates/coordinode-query/` no
# longer drags every transitive dependent into the PR with a fake bump.
semver_check = false
git_only = true
publish = false
# Per-crate CHANGELOG.md is enabled: each crate under crates/ gets its own
# CHANGELOG.md updated by release-plz. A workspace-wide CHANGELOG.md is
# additionally generated by git-cliff in the release workflow.
git_tag_enable = false
git_release_enable = false
git_tag_name = "v{{ version }}"
# All crate changes are aggregated into a single CHANGELOG.md at the repo root.
# Each crate gets its own subsection grouped under the version header.
workspace_changelog = "CHANGELOG.md"

[changelog]
commit_parsers = [
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^style", skip = true },
    { message = "^build", skip = true },
    { message = "^docs\\(ci\\)", skip = true },
    { message = "^docs\\(copilot\\)", skip = true },
    { message = "^Merge", skip = true },
    { message = "^Revert", skip = true },
    { message = "^docs", group = "Documentation" },
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactored" },
    { message = "^test", group = "Testing" },
]

# The shipped binary — only this crate gets a git tag and GitHub Release.
# CHANGELOG.md is generated here (per-crate) AND aggregated workspace-wide.
[[package]]
name = "coordinode-server"
git_tag_enable = true
git_release_enable = true

# ─── Library crates ────────────────────────────────────────────────────
#
# Every library crate gets a unique `git_tag_name`.  Reason: the workspace
# release tag (`v0.4.x`) is owned by `coordinode-server`; without a unique
# pattern release-plz would adopt that tag as the baseline for every other
# crate, then fail to find the crate inside the old worktree (the crate
# may not have existed at that point in history).
#
# We do NOT set `release = false` here — that flag excludes the crate from
# the workspace CHANGELOG.md aggregation done by our fork
# (release-plz#2791).  With just `git_tag_enable = false` (inherited from
# the workspace block) the crate participates in the changelog but is not
# tagged or released to GitHub.

[[package]]
name = "coordinode-client"
git_tag_name = "coordinode-client-v{{ version }}"

[[package]]
name = "coordinode-integration"
git_tag_name = "coordinode-integration-v{{ version }}"

[[package]]
name = "coordinode-auth"
git_tag_name = "coordinode-auth-v{{ version }}"

[[package]]
name = "coordinode-bench"
git_tag_name = "coordinode-bench-v{{ version }}"

[[package]]
name = "coordinode-cluster"
git_tag_name = "coordinode-cluster-v{{ version }}"

[[package]]
name = "coordinode-core"
git_tag_name = "coordinode-core-v{{ version }}"

[[package]]
name = "coordinode-embed"
git_tag_name = "coordinode-embed-v{{ version }}"

[[package]]
name = "coordinode-modality"
git_tag_name = "coordinode-modality-v{{ version }}"

[[package]]
name = "coordinode-query"
git_tag_name = "coordinode-query-v{{ version }}"

[[package]]
name = "coordinode-raft"
git_tag_name = "coordinode-raft-v{{ version }}"

[[package]]
name = "coordinode-s3"
git_tag_name = "coordinode-s3-v{{ version }}"

[[package]]
name = "coordinode-search"
git_tag_name = "coordinode-search-v{{ version }}"

[[package]]
name = "coordinode-storage"
git_tag_name = "coordinode-storage-v{{ version }}"

[[package]]
name = "coordinode-test-fixtures"
git_tag_name = "coordinode-test-fixtures-v{{ version }}"

[[package]]
name = "coordinode-timeseries"
git_tag_name = "coordinode-timeseries-v{{ version }}"

[[package]]
name = "coordinode-vector"
git_tag_name = "coordinode-vector-v{{ version }}"

# Bench crates (coordinode-gold-bench, coordinode-bench-vector-ann) live in
# their own standalone workspaces under benches/. They are intentionally
# excluded from release-plz tracking since they never ship and are versioned
# independently of the server release line.
