[workspace]
# No crates.io publishing — coordinode is a server binary, not a library.
# Releases produce musl binaries + Docker image pushed to ghcr.io.
semver_check = false
git_only = true
publish = false
# Per-crate CHANGELOG.md is enabled: each crate under crates/ gets its own
# CHANGELOG.md updated by release-plz. A workspace-wide CHANGELOG.md is
# additionally generated by git-cliff in the release workflow.
git_tag_enable = false
git_release_enable = false
git_tag_name = "v{{ version }}"
# All crate changes are aggregated into a single CHANGELOG.md at the repo root.
# Each crate gets its own subsection grouped under the version header.
workspace_changelog = "CHANGELOG.md"

[changelog]
commit_parsers = [
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^style", skip = true },
    { message = "^build", skip = true },
    { message = "^docs\\(ci\\)", skip = true },
    { message = "^docs\\(copilot\\)", skip = true },
    { message = "^Merge", skip = true },
    { message = "^Revert", skip = true },
    { message = "^docs", group = "Documentation" },
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactored" },
    { message = "^test", group = "Testing" },
]

# The shipped binary — only this crate gets a git tag and GitHub Release.
# CHANGELOG.md is generated here (per-crate) AND by git-cliff at workspace level.
[[package]]
name = "coordinode-server"
git_tag_enable = true
git_release_enable = true

# Library crate — release-plz skips version bumping and cargo package for it.
# Changelog is derived from workspace CHANGELOG.md via scripts/split-changelog.py.
[[package]]
name = "coordinode-client"
release = false
