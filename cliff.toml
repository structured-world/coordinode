# git-cliff configuration — workspace-wide changelog for CoordiNode.
# All commits across all crates are included (no package-directory filtering).
# Matches commit_parsers in .release-plz.toml.

[changelog]
header = "# Changelog\n\n"
body = """
## {{ version }} — {{ timestamp | date(format="%Y-%m-%d") }}

{% for group, commits in commits | group_by(attribute="group") -%}
### {{ group }}
{% for commit in commits -%}
- {% if commit.scope %}({{ commit.scope }}) {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}\
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
# Tags that mark a release — used to group commits by version.
tag_pattern = "v[0-9].*"
commit_parsers = [
    { message = "^chore",           skip = true },
    { message = "^ci",              skip = true },
    { message = "^style",           skip = true },
    { message = "^build",           skip = true },
    { message = "^docs\\(ci\\)",    skip = true },
    { message = "^docs\\(copilot\\)", skip = true },
    { message = "^Merge",           skip = true },
    { message = "^Revert",          skip = true },
    { message = "^docs",   group = "Documentation" },
    { message = "^feat",   group = "Added" },
    { message = "^fix",    group = "Fixed" },
    { message = "^perf",   group = "Performance" },
    { message = "^refactor", group = "Refactored" },
    { message = "^test",   group = "Testing" },
]
